<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>旅遊計劃</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#fff;--blue:#1877f2;--blue-d:#0d5ec7;
  --text:#1c1e21;--sub:#606770;--border:#dde1e7;--radius:14px;
}
body{font-family:"Microsoft JhengHei","PingFang TC",-apple-system,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

[contenteditable="true"]:hover:not(:focus){background:rgba(24,119,242,.07);border-radius:4px;cursor:text}
[contenteditable="true"]:focus{outline:2px solid var(--blue);border-radius:4px;padding:1px 4px;background:#eef4ff}

/* ── Header ── */
.trip-cover{
  background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 40%,#1877f2 100%);
  color:#fff;padding:28px 32px 22px;position:relative;overflow:hidden
}
.trip-cover::after{
  content:'✈';position:absolute;right:32px;bottom:12px;font-size:80px;opacity:.08
}
.trip-emoji{font-size:32px;margin-bottom:8px}
.tc-title{font-size:22px;font-weight:800;letter-spacing:-.3px;display:inline-block;min-width:100px}
.tc-sub{font-size:14px;opacity:.75;margin-top:3px;display:inline-block;min-width:80px}
.tc-dates{font-size:12px;opacity:.6;margin-top:2px;display:inline-block;min-width:100px}
.tc-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.hbtn{
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:#fff;
  border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:5px;transition:.15s
}
.hbtn:hover{background:rgba(255,255,255,.26)}
.hbtn.pri{background:var(--blue);border-color:var(--blue)}

/* ── Section Card ── */
.sec-wrap{
  background:var(--card);border-radius:var(--radius);
  margin:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06);
  overflow:hidden
}
.sec-head{
  display:flex;align-items:center;gap:10px;padding:13px 18px;
  background:var(--sec-color,#1a2a4a);color:#fff
}
.sec-name{font-size:15px;font-weight:700;flex:1;min-width:60px;display:inline-block}
.sec-meta{display:flex;align-items:center;gap:8px}
.sec-meta button{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit
}
.sec-meta button:hover{background:rgba(255,255,255,.3)}
.sec-color-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.5);cursor:pointer}

/* ── Day Tabs ── */
.day-tabs{
  display:flex;align-items:center;gap:0;padding:0 16px;
  background:#f9fafc;border-bottom:1px solid var(--border);overflow-x:auto;
}
.day-tab{
  padding:10px 16px;font-size:13px;font-weight:600;color:var(--sub);
  cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:.15s
}
.day-tab:hover{color:var(--blue)}
.day-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.day-tab.all{color:#888;font-weight:500}
.add-day-btn{
  padding:8px 12px;font-size:12px;color:var(--blue);cursor:pointer;
  background:none;border:none;font-family:inherit;white-space:nowrap
}
.add-day-btn:hover{text-decoration:underline}

/* ── Main Layout ── */
.sec-body{display:flex;height:calc(100vh - 290px);min-height:400px}

/* ── Left List ── */
.attr-list{
  width:320px;min-width:280px;border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;background:#fafbfc
}

/* Attraction item */
.attr-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px 9px 14px;border-left:3px solid transparent;
  position:relative;cursor:default;
}
.attr-item:hover{background:#f0f4fb}
.attr-num{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;
  background:var(--item-color,#888);color:#fff;flex-shrink:0
}
.cat-icon{
  width:32px;height:32px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;transition:.15s
}
.cat-icon:hover{transform:scale(1.2)}
.attr-text{flex:1;min-width:0}
.attr-name{
  font-size:13px;font-weight:700;color:var(--text);display:block;
  white-space:normal;overflow:visible;word-break:break-word
}
.attr-sub{
  font-size:11px;color:var(--sub);display:block;margin-top:1px;
  white-space:normal;overflow:visible
}
.attr-day-badge{
  font-size:10px;font-weight:700;color:#fff;border-radius:8px;
  padding:1px 6px;background:var(--item-color,#888);white-space:nowrap
}
.no-coord{
  font-size:10px;background:#fff3cd;color:#856404;border:1px solid #ffc107;
  border-radius:10px;padding:1px 6px;cursor:pointer;white-space:nowrap
}
.attr-ctrl{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.attr-item:hover .attr-ctrl{opacity:1}
.attr-ctrl button{
  background:#f0f2f5;border:none;color:#666;border-radius:6px;
  width:22px;height:22px;cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center
}
.attr-ctrl button:hover{background:#e0e4ea;color:#333}
.attr-ctrl .del:hover{background:#fde8e8;color:#e74c3c}

/* Transport connector */
.trans-row{display:flex;align-items:center;padding:0 12px;height:30px;gap:0}
.trans-line{flex:1;height:1.5px;background:var(--tc,#dde1e7)}
.trans-badge{
  display:flex;align-items:center;gap:4px;padding:3px 10px;
  background:#fff;border:1.5px solid var(--tc,#dde1e7);border-radius:14px;
  font-size:11px;font-weight:600;color:var(--tc,#888);cursor:pointer;white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.07);transition:.15s
}
.trans-badge:hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.13)}

.add-attr-btn{
  width:100%;padding:10px;text-align:center;color:var(--blue);font-size:12px;
  font-weight:600;background:none;border:none;cursor:pointer;
  border-top:1px solid var(--border)
}
.add-attr-btn:hover{background:#eef4ff}

/* ── Summary bar ── */
.sec-summary{
  padding:8px 16px;background:#f7f9fc;border-top:1px solid var(--border);
  font-size:12px;color:var(--sub);display:flex;gap:18px;flex-wrap:wrap;align-items:center
}
.sum-chip{display:flex;align-items:center;gap:5px}
.sum-chip span:first-child{font-size:14px}

/* ── Map ── */
.map-wrap{flex:1;position:relative;overflow:hidden}
.leaflet-map{width:100%;height:100%}
.pin-hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:#fff;padding:7px 16px;border-radius:24px;
  font-size:12px;z-index:900;pointer-events:none;display:none;white-space:nowrap
}

/* ── Map Toolbar ── */
.map-tb{position:absolute;top:8px;right:8px;z-index:800;display:flex;flex-direction:column;gap:4px}
.mtb-btn{
  background:#fff;border:1px solid #ccc;border-radius:8px;
  padding:6px 10px;font-size:12px;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.1);font-family:inherit;
  display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.12s
}
.mtb-btn:hover{background:#eef4ff;border-color:var(--blue);color:var(--blue)}
.mtb-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.mtb-search{
  background:#fff;border:1px solid #ccc;border-radius:8px;
  padding:6px 10px;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.1);
  width:200px;display:none;font-family:inherit
}
.mtb-search.vis{display:block}
.search-res{
  position:absolute;top:calc(100%+2px);right:0;background:#fff;
  border:1px solid var(--border);border-radius:10px;
  box-shadow:0 4px 16px rgba(0,0,0,.1);width:260px;max-height:200px;
  overflow-y:auto;z-index:900;display:none
}
.search-res.vis{display:block}
.sr-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f2f5;line-height:1.35}
.sr-item:hover{background:#eef4ff}

/* ── Add Section ── */
.add-sec{
  margin:4px 24px 28px;padding:13px;background:var(--card);
  border:2px dashed #c8cdd5;border-radius:var(--radius);
  text-align:center;cursor:pointer;color:#8a97a8;font-size:13px;
  font-family:inherit;transition:.15s
}
.add-sec:hover{border-color:var(--blue);color:var(--blue);background:#eef4ff}

/* ── Add Popup ── */
.add-popup{min-width:200px}
.add-popup h4{font-size:13px;font-weight:700;color:#1a2a4a;margin-bottom:10px}
.add-popup input,.add-popup select{
  width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:7px;
  font-size:12px;margin-bottom:7px;font-family:inherit;background:#fff
}
.add-popup input:focus,.add-popup select:focus{outline:2px solid var(--blue);border-color:var(--blue)}
.pp-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:4px}
.pp-btns button{padding:5px 14px;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit}
.pp-ok{background:var(--blue);color:#fff}
.pp-cancel{background:#f0f2f5;color:#555}

/* ── Floating Pickers ── */
.cat-picker,.trans-picker,.day-assign-picker{
  position:fixed;background:#fff;border:1px solid var(--border);border-radius:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.15);padding:10px;z-index:9999
}
.cat-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;width:240px}
.cat-opt{padding:9px 4px;border-radius:9px;cursor:pointer;text-align:center;font-size:11px;border:2px solid transparent;transition:.12s}
.cat-opt:hover{background:#f0f4fb;border-color:var(--border)}
.cat-opt .ci{font-size:22px;display:block;margin-bottom:3px}
.trans-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;width:360px}
.trans-opt{padding:9px 4px;border-radius:9px;cursor:pointer;text-align:center;font-size:11px;border:2px solid transparent;transition:.12s}
.trans-opt:hover{background:#f0f4fb}
.trans-opt.sel{border-color:var(--tc);background:color-mix(in srgb,var(--tc) 8%,#fff)}
.trans-opt .ti{font-size:22px;display:block;margin-bottom:3px}
.day-assign-picker{display:flex;flex-direction:column;gap:3px;min-width:150px;padding:8px}
.day-assign-picker button{
  padding:7px 14px;border:1px solid var(--border);border-radius:7px;
  background:#fff;cursor:pointer;font-size:12px;font-family:inherit;text-align:left
}
.day-assign-picker button:hover{background:#eef4ff;border-color:var(--blue);color:var(--blue)}

/* ── Print ── */
@media print{
  .tc-actions,.sec-meta,.map-tb,.add-attr-btn,.add-sec,.attr-ctrl,
  .add-day-btn,.add-sec{display:none!important}
  .sec-body{height:auto}
  .map-wrap{height:300px}
  [contenteditable]{outline:none!important;background:transparent!important}
  .sec-wrap{break-inside:avoid;margin:10px}
}

/* ── OVERVIEW ── */
.ov-section{padding:16px 24px 0;display:flex;flex-direction:column;gap:16px}
.ov-block{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06);overflow:hidden}
.ov-block-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;background:#1a2a4a;color:#fff}
.ov-block-title{font-size:13.5px;font-weight:700}
.ov-block-add{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:.12s}
.ov-block-add:hover{background:rgba(255,255,255,.32)}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;padding:16px}
.mc-card{background:#fff;border-radius:12px;border-top:4px solid #ccc;padding:13px 15px 10px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mc-name{font-size:15px;font-weight:800;margin-bottom:2px}
.mc-note{font-size:10.5px;color:#606770;line-height:1.35;margin-bottom:5px}
.mc-chips{display:flex;gap:4px;flex-wrap:wrap}
.mc-chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.flight-list{display:flex;flex-direction:column;gap:0;padding:6px 12px 12px}
.fl-card{border-left:3px solid #ccc;padding:7px 10px 6px 11px;margin-top:7px;background:#f9fafc;border-radius:0 8px 8px 0;position:relative}
.fl-label{font-size:11px;font-weight:700;margin-bottom:2px}
.fl-times{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:#1c1e21;margin:2px 0}
.fl-arr{font-size:10px;color:#aaa;letter-spacing:1px}
.fl-route{font-size:11px;color:#444;font-weight:600}
.fl-detail{font-size:10px;color:#606770;margin-top:1px}
.fl-cost{font-size:10px;font-weight:700;margin-top:2px}
.hotel-list{padding:0 12px 12px}
.ht-city{margin-top:9px;border-radius:10px;overflow:hidden;border:1px solid #e8eaed}
.ht-city-hd{display:flex;align-items:center;justify-content:space-between;padding:6px 11px;color:#fff;font-size:12px;font-weight:700}
.ht-add-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:5px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit}
.ht-card{padding:8px 11px 7px;border-bottom:1px solid #f0f2f5;position:relative;background:#fff}
.ht-card:last-child{border-bottom:none}
.ht-name{font-size:12px;font-weight:700;margin-bottom:1px}
.ht-who{font-size:10px;color:#606770;margin-bottom:1px}
.ht-note{font-size:10px;color:#888;margin-bottom:3px}
.ht-foot{display:flex;align-items:center;justify-content:space-between}
.ht-date{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px}
.ht-nights{font-size:10px;color:#606770;font-weight:600}
.ht-price{font-size:10px;font-weight:700}
.ov-ctrl{display:flex;gap:3px;position:absolute;top:5px;right:6px;opacity:0;transition:.15s}
.mc-card:hover .ov-ctrl,.fl-card:hover .ov-ctrl,.ht-card:hover .ov-ctrl{opacity:1}
.ov-ebtn{background:#eef4ff;border:1px solid rgba(24,119,242,.3);color:#1877f2;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0}
.ov-dbtn{background:#fdecea;border:1px solid rgba(231,76,60,.25);color:#e74c3c;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0}
.ov-add-btn{width:100%;padding:8px;border:1.5px dashed #c8cdd5;border-radius:8px;background:none;font-size:11.5px;color:#606770;font-weight:700;cursor:pointer;font-family:inherit;margin-top:7px;transition:.15s}
.ov-add-btn:hover{border-color:#1877f2;color:#1877f2;background:#eef4ff}
.ov-divider{display:flex;align-items:center;gap:12px;padding:16px 24px 4px;color:#aaa;font-size:11.5px;font-weight:700;letter-spacing:1px}
.ov-divider::before,.ov-divider::after{content:'';flex:1;height:1px;background:#e0e4ea}
/* CRUD */
.crud-box{background:#fff;border-radius:18px;padding:20px 22px;width:90%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.crud-box::-webkit-scrollbar{width:3px}
.crud-box::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:2px}
.crud-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.crud-hd span{font-size:14px;font-weight:800}
.crud-x{background:none;border:none;font-size:16px;color:#aaa;cursor:pointer;padding:2px;font-family:inherit}
.cf{margin-bottom:9px}
.cf label{font-size:10px;font-weight:700;color:#606770;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.cf input,.cf select,.cf textarea{width:100%;padding:7px 9px;border:1px solid #dde1e7;border-radius:7px;font-size:12.5px;font-family:inherit;outline:none;box-sizing:border-box;transition:border-color .15s}
.cf input:focus,.cf textarea:focus{border-color:#1877f2;box-shadow:0 0 0 3px rgba(24,119,242,.1)}
.cf textarea{resize:vertical;min-height:52px}
.cf2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.cf3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.cf-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.cf-sw{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:.12s;flex-shrink:0}
.cf-sw.on{border-color:#1c1e21;transform:scale(1.2)}
.crud-btns{display:flex;gap:7px;margin-top:15px}
.crud-ok{flex:1;padding:9px;background:#1877f2;color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.crud-ok:hover{background:#0d5ec7}
.crud-cancel{padding:9px 13px;background:#f0f2f5;color:#606770;border:none;border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.crud-del{padding:9px 13px;background:#fdecea;color:#e74c3c;border:none;border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}


/* ── Tab Navigation ── */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e8eaed;position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 22px;font-size:13.5px;font-weight:700;color:#606770;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:#1877f2;background:#f5f7fa}
.tab-btn.active{color:#1877f2;border-bottom-color:#1877f2;background:#f0f4ff}
.tab-panel{display:none;min-height:calc(100vh - 120px)}
.tab-panel.active{display:block}
.ov-section-single{padding:16px 24px;display:flex;flex-direction:column;gap:16px}
/* Stats */
.ov-stats{display:flex;gap:12px;flex-wrap:wrap}
.ov-stat{background:#fff;border-radius:12px;padding:16px 20px;flex:1;min-width:100px;box-shadow:0 1px 3px rgba(0,0,0,.1);text-align:center;cursor:default}
.ov-stat-num{font-size:28px;font-weight:800;color:#1877f2;line-height:1}
.ov-stat-lbl{font-size:11px;color:#606770;margin-top:4px;font-weight:600}
/* Timeline */
.tl-wrap{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.1),0 4px 16px rgba(0,0,0,.06);overflow:hidden}
.tl-title{font-size:13.5px;font-weight:700;color:#1a2a4a;margin-bottom:12px}
.tl-scroll{overflow-x:auto}
.tl-table{border-collapse:collapse;font-size:11px;white-space:nowrap}
.tl-table th{padding:4px 3px;color:#888;font-weight:600;text-align:center;border-bottom:1px solid #e8eaed;min-width:24px}
.tl-table th.city-hd{color:#fff;font-size:10px;font-weight:800;padding:3px 5px}
.tl-name-col{padding:5px 12px 5px 0;font-weight:700;font-size:12px;white-space:nowrap;border-right:1px solid #e8eaed;min-width:56px;vertical-align:middle}
.tl-dot{display:inline-block;width:22px;height:22px;border-radius:5px;vertical-align:middle}
/* City cards */
.city-cards{display:flex;gap:12px;flex-wrap:wrap}
.city-card{flex:1;min-width:180px;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer;transition:.15s}
.city-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.city-card-hd{padding:14px 16px;color:#fff;font-weight:800;font-size:15px;letter-spacing:-.3px}
.city-card-body{background:#fff;padding:10px 16px;font-size:12px;color:#606770;line-height:1.9}
/* Quick nav */
.quick-nav{display:flex;gap:10px;flex-wrap:wrap}
.quick-nav-btn{flex:1;min-width:130px;padding:11px;border:1.5px solid #dde1e7;border-radius:10px;background:#fff;font-size:12.5px;font-weight:700;color:#444;cursor:pointer;font-family:inherit;transition:.15s;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.quick-nav-btn:hover{border-color:#1877f2;color:#1877f2;background:#f0f4ff;box-shadow:0 2px 8px rgba(24,119,242,.12)}

// ── State ──────────────────────────────────────────────
let trip = loadData();
let maps = {}, editMode = {}, activeDays = {};
let srTimer = null;

function loadData(){
  try{var d=localStorage.getItem('trip_thai_v1');var r=d?JSON.parse(d):null;
    if(r&&r.title&&r.title.includes('三趴'))return r;
    return structuredClone(DEFAULT);}catch(e){return structuredClone(DEFAULT);}
}
function save(){try{localStorage.setItem('trip_thai_v1',JSON.stringify(trip));}catch(e){}}
function resetDefault(){if(confirm('重置為泰國三趴 22 日預設資料？')){trip=structuredClone(DEFAULT);save();renderAll();renderMembers();renderFlights();renderHotels();}}
function uid(){return 'x'+Math.random().toString(36).slice(2,9)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function haversine(a,b,c,d){
  const R=6371,r=Math.PI/180;
  const dLat=(c-a)*r,dLng=(d-b)*r;
  const x=Math.sin(dLat/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function estimateMins(a1,a2,mode){
  if(!a1?.lat||!a2?.lat) return null;
  const t=TRANS[mode]||TRANS.walk;
  return Math.max(1,Math.round(haversine(a1.lat,a1.lng,a2.lat,a2.lng)*t.d/t.speed*60));
}
function fmtMins(m){
  if(m===null||m===undefined) return '?';
  if(m<60) return m+'分';
  const h=Math.floor(m/60),r=m%60;
  return r?`${h}時${r}分`:`${h}小時`;
}
function enclosingCircle(pts){
  if(!pts.length) return null;
  const lat=pts.reduce((s,p)=>s+p.lat,0)/pts.length;
  const lng=pts.reduce((s,p)=>s+p.lng,0)/pts.length;
  let r=0;
  for(const p of pts) r=Math.max(r,haversine(lat,lng,p.lat,p.lng));
  return {lat,lng,rKm:r+0.35};
}
function clusterAttrs(attrs,rKm){
  const valid=attrs.filter(a=>a.lat&&a.lng);
  const done=new Set(),groups=[];
  for(const a of valid){
    if(done.has(a.id)) continue;
    const g=[a]; done.add(a.id);
    let ch=true;
    while(ch){ch=false;for(const b of valid){if(done.has(b.id)) continue;
      if(g.some(x=>haversine(x.lat,x.lng,b.lat,b.lng)<=rKm)){g.push(b);done.add(b.id);ch=true}
    }}
    groups.push(g);
  }
  return groups;
}

          <button class="mtb-btn" id="srbtn-${sec.id}" onclick="toggleSearch('${sec.id}')">🔍 搜尋</button>
          <div style="position:relative">
            <input class="mtb-search" id="msb-${sec.id}" placeholder="輸入景點或地址..."
              oninput="onSrInput(event,'${sec.id}')" onkeydown="if(event.key==='Escape')toggleSearch('${sec.id}')">
            <div class="search-res" id="msr-${sec.id}"></div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #ccc;border-radius:8px;padding:5px 10px;box-shadow:0 2px 6px rgba(0,0,0,.1)">
            <span style="font-size:11px;color:#888">聚集</span>
            <select style="border:none;font-size:11px;background:transparent;cursor:pointer;font-family:inherit"
              onchange="setCluster('${sec.id}',this.value)">
              ${[0.5,1,1.5,2,3].map(v=>`<option value="${v}"${(sec.clusterKm||1.5)==v?' selected':''}>${v}km</option>`).join('')}

// ── Day Tabs ────────────────────────────────────────────
function secDayDate(sec, d) {
  // Returns "7/23" string for day d of this section
  var offset = (sec.startDayOffset || 0) + d - 1;
  var dt = new Date(2026, 6, 23 + offset); // July 23, 2026 = day 1 of trip
  return (dt.getMonth()+1) + '/' + dt.getDate();
}
function renderDayTabs(sec){
  const bar=document.getElementById('dtabs-'+sec.id);
  if(!bar) return;
  bar.innerHTML='';
  const days=sec.days||1;
  // All
  const all=document.createElement('div');
  all.className='day-tab all'+(activeDays[sec.id]===0?' active':'');
  all.textContent='全部';
  all.onclick=()=>{activeDays[sec.id]=0;renderDayTabs(sec);renderList(sec);renderMapMarkers(sec)};
  bar.appendChild(all);
  // Day tabs
  for(let d=1;d<=days;d++){
    const tab=document.createElement('div');
    tab.className='day-tab'+(activeDays[sec.id]===d?' active':'');
    tab.style.color=activeDays[sec.id]===d?dayColor(d):'';
    tab.style.borderBottomColor=activeDays[sec.id]===d?dayColor(d):'transparent';
    const count=sec.attractions.filter(a=>a.day===d).length;
    const dateStr=secDayDate(sec,d);
    tab.innerHTML=dateStr+' <span style="font-size:10px;opacity:.6">('+count+')</span>';
    tab.onclick=(()=>{const _d=d;return()=>{
      activeDays[sec.id]=_d;renderDayTabs(sec);renderList(sec);renderMapMarkers(sec)
    }})();
    bar.appendChild(tab);
  }
  const addDay=document.createElement('button');
  addDay.className='add-day-btn';
  addDay.textContent='＋ 新增天數';
  addDay.onclick=()=>{
    sec.days=(sec.days||1)+1; save();
    renderDayTabs(sec); renderList(sec);
  };
  bar.appendChild(addDay);
}

// ── Attraction List ─────────────────────────────────────
function renderList(sec){
  const list=document.getElementById('al-'+sec.id);
  if(!list) return;
  list.innerHTML='';
  const ad=activeDays[sec.id]||0;
  const shown=ad===0?sec.attractions:sec.attractions.filter(a=>a.day===ad);

  shown.forEach((a,idx)=>{
    const c=CAT[a.cat]||CAT.other;
    const dc=dayColor(a.day||1);
    const item=document.createElement('div');
    item.className='attr-item'; item.id='ai-'+a.id; item.draggable=true; item.dataset.sid=sec.id; item.dataset.aid=a.id;
    item.style.setProperty('--item-color',dc);
    item.style.borderLeftColor=dc;
    item.innerHTML=`
      <div class="attr-num">${idx+1}</div>
      <div class="cat-icon" style="background:${c.bg}" title="更改類別"
        onclick="openCatPicker('${sec.id}','${a.id}',this)">${c.e}</div>
      <div class="attr-text">
        <span class="attr-name" contenteditable="true" spellcheck="false"
          onblur="attrF('${sec.id}','${a.id}','name',this.textContent)">${esc(a.name)}</span>
        <span class="attr-sub" contenteditable="true" spellcheck="false"
          onblur="attrF('${sec.id}','${a.id}','sub',this.textContent)">${esc(a.sub||'')}</span>
        <span class="attr-time ${a.startTime?'':'unset'}"
          onclick="editAttrTime('${sec.id}','${a.id}',event)">${a.startTime?fmtTimeRange(a.startTime,a.stayMins||60):'⏰ 設定時間'}</span>
        ${(!a.lat||!a.lng)?`<span class="no-coord" onclick="pinMode('${sec.id}','${a.id}')">📍 點地圖定位</span>`:''}
      </div>
      ${ad===0?`<span class="attr-day-badge" style="background:${dc}"
        title="點擊更改天數" onclick="openDayPicker('${sec.id}','${a.id}',this)">${secDayDate(sec,a.day||1)}</span>`:''}
      <div class="attr-ctrl">
        <span class="drag-handle" title="拖曳排序">⠿</span>
        <button class="del" onclick="delAttr('${sec.id}','${a.id}')">✕</button>
      </div>`;
    list.appendChild(item);
    // Drag-and-drop handlers
    item.addEventListener('dragstart',e=>{
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',a.id);
      item.classList.add('dragging');
    });
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      const fromId=e.dataTransfer.getData('text/plain');
      if(fromId===a.id) return;
      const fromIdx=sec.attractions.findIndex(x=>x.id===fromId);
      const toIdx=sec.attractions.findIndex(x=>x.id===a.id);
      if(fromIdx<0||toIdx<0) return;
      const [moved]=sec.attractions.splice(fromIdx,1);
      sec.attractions.splice(toIdx,0,moved);
      save(); renderList(sec); renderMapMarkers(sec); renderSummary(sec);
    });

    // Transport connector
    if(idx<shown.length-1){
      const next=shown[idx+1];
      const t=TRANS[a.nextT||'walk']||TRANS.walk;
      const mins=estimateMins(a,next,a.nextT||'walk');
      const row=document.createElement('div');
      row.className='trans-row';
      row.style.setProperty('--tc',t.c);
      row.innerHTML=`
        <div class="trans-line"></div>
        <div class="trans-badge" style="--tc:${t.c}"
          onclick="openTransPicker('${sec.id}','${a.id}',this,'${a.nextT||'walk'}')">
          ${t.e}&nbsp;${t.l}&nbsp;·&nbsp;${mins!==null?fmtMins(mins):'?'}
        </div>
        <div class="trans-line"></div>`;
      list.appendChild(row);
    }
  });

  const addBtn=document.createElement('button');
  addBtn.className='add-attr-btn';
  addBtn.textContent='＋ 新增景點'+(ad>0?' (Day'+ad+')':'');
  addBtn.onclick=()=>addAttr(sec.id,ad||1);
  list.appendChild(addBtn);
}

function renderSummary(sec){
  const el=document.getElementById('sum-'+sec.id);
  if(!el) return;
  const valid=sec.attractions.filter(a=>a.lat&&a.lng).length;
  let totalMins=0,totalKm=0;
  const days=sec.days||1;
  for(let i=0;i<sec.attractions.length-1;i++){
    const a=sec.attractions[i],b=sec.attractions[i+1];
    if(a.day!==b.day) continue; // only within same day
    const m=estimateMins(a,b,a.nextT||'walk');
    if(m) totalMins+=m;
    if(a.lat&&b.lat){const t=TRANS[a.nextT||'walk'];totalKm+=haversine(a.lat,a.lng,b.lat,b.lng)*(t?.d||1.3)}
  }
  el.innerHTML=`
    <div class="sum-chip"><span>📍</span><span>${sec.attractions.length} 個景點</span></div>
    <div class="sum-chip"><span>📅</span><span>${days} 天</span></div>
    <div class="sum-chip"><span>🚗</span><span>預估通勤 ${fmtMins(totalMins)}</span></div>
    <div class="sum-chip"><span>📏</span><span>約 ${totalKm.toFixed(1)} km</span></div>
    <div class="sum-chip"><span>🗺️</span><span>${valid}/${sec.attractions.length} 已定位</span></div>`;
}

// ── Map ─────────────────────────────────────────────────
function initMap(sec){
  const el=document.getElementById('map-'+sec.id);
  if(!el||maps[sec.id]) return;
  const m=L.map('map-'+sec.id).setView(sec.mapC||[25,121],sec.mapZ||12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19
  }).addTo(m);
  maps[sec.id]=m; editMode[sec.id]=false;
  m.on('moveend zoomend',()=>{
    const c=m.getCenter();
    sec.mapC=[+c.lat.toFixed(5),+c.lng.toFixed(5)]; sec.mapZ=m.getZoom(); save();
  });
  m.on('click',e=>{
    if(m._pinId){
      const a=sec.attractions.find(x=>x.id===m._pinId);
      if(a){a.lat=+e.latlng.lat.toFixed(6);a.lng=+e.latlng.lng.toFixed(6);save()}
      m._pinId=null;
      document.getElementById('hint-'+sec.id).style.display='none';
      renderList(sec);renderMapMarkers(sec);renderSummary(sec);
    } else if(editMode[sec.id]) openAddPopup(sec,e.latlng,m);
  });
  renderMapMarkers(sec);
}

function renderMapMarkers(sec){
  const m=maps[sec.id];
  if(!m) return;
  m.eachLayer(l=>{if(l instanceof L.Marker||l instanceof L.Circle||l instanceof L.Polyline)m.removeLayer(l)});
  const ad=activeDays[sec.id]||0;
  const displayed=ad===0?sec.attractions:sec.attractions.filter(a=>a.day===ad);
  const hasCoords=displayed.filter(a=>a.lat&&a.lng);

  // Cluster circles
  const groups=clusterAttrs(hasCoords,sec.clusterKm||1.5);
  groups.forEach(grp=>{
    if(grp.length<2) return;
    const c=enclosingCircle(grp);
    const dayNum=grp[0].day||1;
    const col=dayColor(dayNum);
    L.circle([c.lat,c.lng],{
      radius:c.rKm*1000,color:col,fillColor:col,fillOpacity:.07,
      weight:1.5,dashArray:'8,5',interactive:false
    }).bindTooltip(`${grp.length} 個景點`,{sticky:true}).addTo(m);
  });

  // Route polylines (per day)
  const days=[...new Set(displayed.map(a=>a.day||1))].sort();
  days.forEach(dayNum=>{
    const dayAttrs=displayed.filter(a=>(a.day||1)===dayNum&&a.lat&&a.lng);
    const col=dayColor(dayNum);
    for(let i=0;i<dayAttrs.length-1;i++){
      const a=dayAttrs[i],b=dayAttrs[i+1];
      L.polyline([[a.lat,a.lng],[b.lat,b.lng]],{
        color:col,weight:2.5,opacity:.65,dashArray:'7,4',interactive:false
      }).addTo(m);
    }
  });

  // Markers
  displayed.forEach((a,idx)=>{
    if(!a.lat||!a.lng) return;
    const c=CAT[a.cat]||CAT.other;
    const dc=dayColor(a.day||1);
    const num=displayed.filter(x=>x.lat&&x.lng).indexOf(a)+1;
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="46" viewBox="0 0 36 46">
      <ellipse cx="18" cy="43" rx="7" ry="3.5" fill="rgba(0,0,0,.15)"/>
      <path d="M18 1C8.05 1 0 9.05 0 19c0 11 18 26 18 26S36 30 36 19C36 9.05 27.95 1 18 1z" fill="${c.c}"/>
      <circle cx="18" cy="19" r="11" fill="rgba(255,255,255,.93)"/>
      <text x="18" y="23.5" text-anchor="middle" font-size="12">${c.e}</text>
      <circle cx="29" cy="9" r="7" fill="${dc}" stroke="#fff" stroke-width="1.5"/>
      <text x="29" y="12.5" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">${a.day||1}</text>
    </svg>`;
    const icon=L.divIcon({html:svg,className:'',iconSize:[36,46],iconAnchor:[18,46],popupAnchor:[0,-48]});
    const mk=L.marker([a.lat,a.lng],{icon,draggable:false}).addTo(m).bindPopup(mkPopup(sec.id,a.id));
    mk._aid=a.id; mk._sid=sec.id;
    mk.on('dragend',e=>{
      a.lat=+e.target.getLatLng().lat.toFixed(6);
      a.lng=+e.target.getLatLng().lng.toFixed(6);
      save();renderMapMarkers(sec);renderSummary(sec);
    });
  });
}

function mkPopup(sid,aid){
  const sec=trip.sections.find(s=>s.id===sid);
  const a=sec?.attractions.find(x=>x.id===aid);
  if(!a) return '';
  const c=CAT[a.cat]||CAT.other;
  const dc=dayColor(a.day||1);
  const idx=sec.attractions.indexOf(a);
  let prev='';
  if(idx>0){
    const p=sec.attractions[idx-1];
    if(p.day===a.day){
      const t=TRANS[p.nextT||'walk'];
      prev=`<div style="font-size:10px;color:#888;margin-bottom:4px">${t.e} 由上站：${fmtMins(estimateMins(p,a,p.nextT||'walk'))}</div>`;
    }
  }
  return `<div style="min-width:170px;font-family:Microsoft JhengHei,sans-serif">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <span style="background:${dc};color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700">Day ${a.day||1}</span>
      <b style="color:${c.c};font-size:13px">${c.e} ${esc(a.name)}</b>
    </div>
    ${prev}
    <div style="font-size:11px;color:#606770">${esc(a.sub||'')}</div>
    ${a.note?`<div style="font-size:11px;margin-top:5px;padding:4px 8px;background:#f4f6f9;border-radius:6px">${esc(a.note)}</div>`:''}
    <div style="margin-top:9px;display:flex;gap:5px">
      <button onclick="editNote('${sid}','${aid}')"
        style="flex:1;padding:4px;font-size:10px;border:1px solid #dde1e7;border-radius:6px;cursor:pointer;background:#f4f6f9">✏️ 備註</button>
      <button onclick="delAttr('${sid}','${aid}')"
        style="flex:1;padding:4px;font-size:10px;border:1px solid #fdecea;border-radius:6px;cursor:pointer;background:#fdecea;color:#e74c3c">🗑️ 刪除</button>
    </div>
  </div>`;
}

// ── Map Edit ────────────────────────────────────────────
function toggleEdit(sid){
  editMode[sid]=!editMode[sid];
  const m=maps[sid];
  const btn=document.getElementById('edbtn-'+sid);
  if(editMode[sid]){
    m.getContainer().style.cursor='crosshair';
    btn.classList.add('on'); btn.textContent='✏️ 結束';
    m.eachLayer(l=>{if(l instanceof L.Marker)l.dragging.enable()});
  } else {
    m.getContainer().style.cursor='';
    btn.classList.remove('on'); btn.textContent='✏️ 編輯';
    m.eachLayer(l=>{if(l instanceof L.Marker)l.dragging.disable()});
  }
}
function pinMode(sid,aid){
  const a=trip.sections.find(s=>s.id===sid)?.attractions.find(x=>x.id===aid);
  if(!editMode[sid]) toggleEdit(sid);
  maps[sid]._pinId=aid;
  const h=document.getElementById('hint-'+sid);
  h.textContent=`點擊地圖設定「${a?.name||'景點'}」的位置`;
  h.style.display='block';
}
function openAddPopup(sec,latlng,m){
  const ad=activeDays[sec.id]||1;
  const dayOpts=Array.from({length:sec.days||1},(_,i)=>`<option value="${i+1}"${i+1===ad?' selected':''}>Day ${i+1}</option>`).join('');
  const catOpts=Object.entries(CAT).map(([k,v])=>`<option value="${k}">${v.e} ${v.l}</option>`).join('');
  const el=document.createElement('div');
  el.className='add-popup';
  el.innerHTML=`
    <h4>📍 新增景點</h4>
    <input id="ppn-${sec.id}" placeholder="景點名稱" type="text">
    <input id="pps-${sec.id}" placeholder="副標題（選填）" type="text">
    <select id="ppc-${sec.id}">${catOpts}</select>
    <select id="ppd-${sec.id}">${dayOpts}</select>
    <div class="pp-btns">
      <button class="pp-cancel" onclick="maps['${sec.id}'].closePopup()">取消</button>
      <button class="pp-ok" onclick="confirmAdd('${sec.id}',${latlng.lat},${latlng.lng})">新增</button>
    </div>`;
  L.popup({minWidth:210}).setLatLng(latlng).setContent(el).openOn(m);
  setTimeout(()=>document.getElementById('ppn-'+sec.id)?.focus(),80);
}

// ── Search ──────────────────────────────────────────────
function toggleSearch(sid){
  const inp=document.getElementById('msb-'+sid);
  const btn=document.getElementById('srbtn-'+sid);
  const vis=inp.classList.contains('vis');
  if(vis){inp.classList.remove('vis');btn.classList.remove('on');inp.value='';document.getElementById('msr-'+sid).classList.remove('vis')}
  else{inp.classList.add('vis');btn.classList.add('on');setTimeout(()=>inp.focus(),50)}
}
function onSrInput(e,sid){
  clearTimeout(srTimer);
  const q=e.target.value.trim();
  if(!q){document.getElementById('msr-'+sid).classList.remove('vis');return}
  srTimer=setTimeout(()=>doSearch(q,sid),400);
}
async function doSearch(q,sid){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=zh-TW,zh`);
    const data=await r.json();
    const res=document.getElementById('msr-'+sid);
    res.innerHTML='';
    if(!data.length) res.innerHTML='<div class="sr-item">無搜尋結果</div>';
    else data.forEach(d=>{
      const item=document.createElement('div');
      item.className='sr-item';
      const name=d.display_name.length>55?d.display_name.slice(0,52)+'…':d.display_name;
      item.textContent=name;
      item.onclick=()=>{
        maps[sid].setView([+d.lat,+d.lon],16);
        res.classList.remove('vis');
        document.getElementById('msb-'+sid).value='';
        if(editMode[sid]){const sec=trip.sections.find(s=>s.id===sid);openAddPopup(sec,{lat:+d.lat,lng:+d.lon},maps[sid])}
      };
      res.appendChild(item);
    });
    res.classList.add('vis');
  }catch(e){console.error(e)}
}
function recenter(sid){
  const sec=trip.sections.find(s=>s.id===sid);
  const ad=activeDays[sid]||0;
  const shown=(ad===0?sec.attractions:sec.attractions.filter(a=>a.day===ad)).filter(a=>a.lat&&a.lng);
  if(!shown.length) return;
  maps[sid].fitBounds(L.latLngBounds(shown.map(a=>[a.lat,a.lng])),{padding:[28,28]});
}

  document.getElementById('sw-'+sid)?.style.setProperty('--sec-color',col);

function setCluster(sid,val){
  const s=trip.sections.find(x=>x.id===sid);
  if(!s) return; s.clusterKm=+val; save(); renderMapMarkers(s);
}
function moveAttr(sid,aid,dir){
  const sec=trip.sections.find(s=>s.id===sid);
  const i=sec.attractions.findIndex(x=>x.id===aid);
  const j=i+dir; if(j<0||j>=sec.attractions.length) return;
  [sec.attractions[i],sec.attractions[j]]=[sec.attractions[j],sec.attractions[i]];
  save(); renderList(sec); renderMapMarkers(sec); renderSummary(sec);
}
function delAttr(sid,aid){
  const sec=trip.sections.find(s=>s.id===sid);
  sec.attractions=sec.attractions.filter(a=>a.id!==aid);
  save(); maps[sid]?.closePopup();
  renderList(sec); renderMapMarkers(sec); renderSummary(sec); renderDayTabs(sec);
}

// ── Day Assign Picker ───────────────────────────────────
function openDayPicker(sid,aid,anchor){
  const sec=trip.sections.find(s=>s.id===sid);
  const a=sec?.attractions.find(x=>x.id===aid);
  const p=document.getElementById('day-picker');
  p.innerHTML='<div style="font-size:11px;font-weight:700;color:#606770;padding:4px 8px;margin-bottom:4px">指定天數</div>';
  for(let d=1;d<=(sec.days||1);d++){
    const btn=document.createElement('button');
    const dc=dayColor(d);
    btn.style.borderColor=(a?.day===d)?dc:'';
    btn.style.color=(a?.day===d)?dc:'';
    btn.innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${dc};margin-right:6px"></span>Day ${d}`;
    btn.onclick=()=>{
      if(a){a.day=d;save();renderList(sec);renderMapMarkers(sec);renderSummary(sec);renderDayTabs(sec)}
      p.style.display='none';
    };
    p.appendChild(btn);
  }
  popup(p,anchor);
}

function popup(el,anchor){
  el.style.display='';
  const r=anchor.getBoundingClientRect();
  el.style.left=r.left+'px'; el.style.top=(r.bottom+4)+'px';
  const er=el.getBoundingClientRect();
  if(er.right>window.innerWidth-8) el.style.left=(window.innerWidth-er.width-8)+'px';
  if(er.bottom>window.innerHeight-8) el.style.top=(r.top-er.height-4)+'px';
  setTimeout(()=>{
    function h(e){if(!el.contains(e.target)){el.style.display='none';document.removeEventListener('click',h)}}
    document.addEventListener('click',h);
  },0);
}

function exportJSON(){
  const b=new Blob([JSON.stringify(trip,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='旅遊計劃_'+trip.title.replace(/[/\\?%*:|"<>]/g,'_')+'.json';
  a.click();
}
function importJSON(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.title&&Array.isArray(d.sections)){trip=d;save();renderAll();alert('匯入成功！')}
      else alert('格式不符');
    }catch{alert('JSON 解析失敗')}
  };
  r.readAsText(f); e.target.value='';
}

      '<div class="cf"><label>飯店名稱</label><input id="cf-name" value="'+escH(h.name)+'" placeholder="飯店全名"></div>'+
      '<div class="cf2"><div class="cf"><label>日期</label><input id="cf-dates" value="'+escH(h.dates)+'" placeholder="7/23–7/26"></div>'+
      '<div class="cf"><label>晚數</label><input id="cf-nights" type="number" min="1" value="'+escH(String(h.nights))+'" placeholder="3"></div></div>'+
      '<div class="cf"><label>入住成員</label><input id="cf-who" value="'+escH(h.who)+'" placeholder="峰哥・依凡"></div>'+
      '<div class="cf"><label>備註</label><textarea id="cf-note">'+escH(h.note)+'</textarea></div>'+
      '<div class="cf"><label>價格</label><input id="cf-price" value="'+escH(h.price)+'" placeholder="NT$3,000/人"></div>'+
      '<div class="cf"><label>🗺 Google Maps 網址（選填，留空自動搜尋飯店名）</label>'+
        '<input id="cf-mapurl" value="'+escH(h.mapUrl||'')+'" placeholder="https://maps.app.goo.gl/..."></div>';
  }
  btns.innerHTML=
    (idx>=0?'<button class="crud-del" onclick="crudDel()">🗑 刪除</button>':'')+
    '<button class="crud-cancel" onclick="crudClose()">取消</button>'+
    '<button class="crud-ok" onclick="crudSave()">儲存</button>';
  document.getElementById('crud-ov').style.display='flex';
}
function pickColor(c){
  _cc=c;
  document.querySelectorAll('#cf-swatches .cf-sw').forEach(function(s){s.classList.toggle('on',s.dataset.c===c);});
}
function crudClose(){document.getElementById('crud-ov').style.display='none';}
function crudSave(){
  var gv=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  if(_ct==='member'){
    var o={name:gv('cf-name'),color:_cc,from:gv('cf-from'),to:gv('cf-to'),note:gv('cf-note')};
    if(!o.name){document.getElementById('cf-name').focus();return;}
    if(_ci>=0)Object.assign(MEMBERS[_ci],o);else MEMBERS.push(o);
    crudClose();renderMembers();
  } else if(_ct==='flight'){
    var o={label:gv('cf-label'),from:gv('cf-from'),to:gv('cf-to'),date:gv('cf-date'),dep:gv('cf-dep'),arr:gv('cf-arr'),flight:gv('cf-flight'),cost:gv('cf-cost'),c:_cc};
    if(!o.label){document.getElementById('cf-label').focus();return;}
    if(_ci>=0)Object.assign(FLIGHTS[_ci],o);else FLIGHTS.push(o);
    crudClose();renderFlights();
  } else if(_ct==='hotel'){
    var o={name:gv('cf-name'),dates:gv('cf-dates'),nights:parseInt(gv('cf-nights'))||1,who:gv('cf-who'),note:gv('cf-note'),price:gv('cf-price'),mapUrl:gv('cf-mapurl')};
    if(!o.name){document.getElementById('cf-name').focus();return;}
    if(_ci>=0)Object.assign(HOTELS[_cCi].stays[_ci],o);else HOTELS[_cCi].stays.push(o);
    crudClose();renderHotels();
  }
}
function crudDel(){
  if(!confirm('確定刪除？'))return;
  if(_ct==='member'){MEMBERS.splice(_ci,1);crudClose();renderMembers();}
  else if(_ct==='flight'){FLIGHTS.splice(_ci,1);crudClose();renderFlights();}
  else if(_ct==='hotel'){HOTELS[_cCi].stays.splice(_ci,1);crudClose();renderHotels();}
}
function ovDel(type,idx,ci){
  if(!confirm('確定刪除？'))return;
  if(type==='member'){MEMBERS.splice(idx,1);renderMembers();}
  else if(type==='flight'){FLIGHTS.splice(idx,1);renderFlights();}
  else if(type==='hotel'){HOTELS[ci].stays.splice(idx,1);renderHotels();}
}

// ── Tab Navigation (declared before renderAll so hoisting is irrelevant) ─────
function switchTab(name) {
  var ids = ['overview','map','members','flights','hotels'];
  ids.forEach(function(id) {
    var panel = document.getElementById('tab-'+id);
    var btn   = document.getElementById('tbtn-'+id);
    if(panel) panel.classList.toggle('active', id===name);
    if(btn)   btn.classList.toggle('active', id===name);
  });
  if (name === 'map') {
    setTimeout(function() {
      if(trip && trip.sections) trip.sections.forEach(function(sec){ initMap(sec); });
      setTimeout(function() {
        Object.values(maps).forEach(function(m){ try{ m.invalidateSize(); }catch(e){} });
      }, 80);
    }, 20);
  }
}

function renderTimeline() {
  var wrap = document.getElementById('tl-table-wrap');
  if (!wrap) return;
  var CITY_RANGES = [
    {name:'⛩️ 清邁', cnt:5,  color:'#C4522A'},
    {name:'🏙 曼谷', cnt:6,  color:'#1A4B8C'},
    {name:'🌴 甲米', cnt:11, color:'#1A7A52'},
  ];
  var startDate = new Date(2026,6,23);
  function dateToDay(s) {
    var parts = s.split('/');
    var dt = new Date(2026, parseInt(parts[0])-1, parseInt(parts[1]));
    return Math.round((dt - startDate) / 86400000) + 1;
  }
  function dayLabel(d) {
    var dt = new Date(startDate.getTime()); dt.setDate(dt.getDate()+d-1);
    return (dt.getMonth()+1)+'/'+(dt.getDate());
  }
  var h = '<table class="tl-table"><thead>';
  h += '<tr><th style="border-right:1px solid #e8eaed"></th>';
  CITY_RANGES.forEach(function(c) {
    h += '<th colspan="'+c.cnt+'" class="city-hd" style="background:'+c.color+'">'+c.name+'</th>';
  });
  h += '</tr><tr><th style="border-right:1px solid #e8eaed;text-align:left;padding-left:2px;font-size:11px;white-space:nowrap">成員</th>';
  for(var d=1;d<=22;d++) h += '<th title="D'+d+' ('+dayLabel(d)+')">D'+d+'</th>';
  h += '</tr></thead><tbody>';
  MEMBERS.forEach(function(m) {
    var fd = dateToDay(m.from), td = dateToDay(m.to);
    h += '<tr><td class="tl-name-col" style="color:'+m.color+'">'+m.name+'</td>';
    for(var d=1;d<=22;d++) {
      var on = d>=fd && d<=td;
      h += '<td><span class="tl-dot" style="background:'+(on?m.color:'#e8eaed')+'"></span></td>';
    }
    h += '</tr>';
  });
  h += '</tbody></table>';
  wrap.innerHTML = h;
}

function updateOvStats() {
  var total = 0;
  if(trip && trip.sections) trip.sections.forEach(function(s){ if(s.attractions) total += s.attractions.length; });
  var el = document.getElementById('ov-stat-places');
  if(el) el.textContent = total || '—';
  var el2 = document.getElementById('ov-stat-members');
  if(el2) el2.textContent = MEMBERS.length;
}


function addMinutes(t,m){
  var parts=t.split(':').map(Number);
  var total=parts[0]*60+parts[1]+m;
  return String(Math.floor(total/60)%24).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
}
function fmtTimeRange(start,mins){
  if(!start) return '⏰ 設定時間';
  var end=addMinutes(start,mins||60);
  var h=mins>=60?Math.floor(mins/60)+'小時'+(mins%60?mins%60+'分':''):(mins||60)+'分';
  return '⏰ '+start+'–'+end+' ('+h+')';
}
function editAttrTime(sid,aid,ev){
  ev.stopPropagation();
  var sec=trip.sections.find(function(s){return s.id===sid;});
  var a=sec&&sec.attractions.find(function(x){return x.id===aid;});
  if(!a) return;
  var title=document.getElementById('crud-title');
  var body=document.getElementById('crud-body');
  var btns=document.getElementById('crud-btns');
  title.textContent='⏰ 設定停留時間';
  body.innerHTML=
    '<div class="cf"><label>開始時間</label><input id="et-start" type="time" value="'+(a.startTime||'09:00')+'"></div>'+
    '<div class="cf"><label>停留時間（分鐘）</label><input id="et-stay" type="number" min="5" step="5" value="'+(a.stayMins||60)+'"></div>'+
    '<div id="et-preview" style="text-align:center;font-size:18px;font-weight:800;color:#1877f2;padding:8px 0"></div>';
  function updatePreview(){
    var s=document.getElementById('et-start')?.value||'09:00';
    var m=+(document.getElementById('et-stay')?.value||60);
    document.getElementById('et-preview').textContent=fmtTimeRange(s,m);
  }
  btns.innerHTML=
    '<button class="crud-cancel" onclick="crudClose()">取消</button>'+
    '<button class="crud-ok" onclick="saveAttrTime(\''+sid+'\',\''+aid+'\')">儲存</button>';
  document.getElementById('crud-ov').style.display='flex';
  setTimeout(function(){
    document.getElementById('et-start')?.addEventListener('input',updatePreview);
    document.getElementById('et-stay')?.addEventListener('input',updatePreview);
    updatePreview();
  },50);
}
function saveAttrTime(sid,aid){
  var sec=trip.sections.find(function(s){return s.id===sid;});
  var a=sec&&sec.attractions.find(function(x){return x.id===aid;});
  if(!a) return;
  a.startTime=document.getElementById('et-start')?.value||null;
  a.stayMins=+(document.getElementById('et-stay')?.value||60);
  save(); crudClose(); renderList(sec);
}

// ── Initialize ───────────────────────────────────────────────────────────────
renderAll();
renderMembers();
renderFlights();
renderHotels();
renderTimeline();
updateOvStats();

</script>
