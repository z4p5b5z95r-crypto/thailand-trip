<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🇹🇭 泰國三趴 22 日之旅</title>
<style>
:root{--cm:#C4522A;--bk:#1A4B8C;--kr:#1A7A52;--gold:#C49A28;--ink:#1D1D1F;--mid:#6E6E73;--g3:#E5E5EA;--g4:#F2F2F7;--w:#fff;--accent:#C4522A}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,"Noto Sans TC",sans-serif;background:var(--g4);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;border:none;cursor:pointer;background:none}
a{color:inherit;text-decoration:none}

/* PICK */
#pick{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(155deg,#062a1e 0%,#0a4a34 28%,#1a6a8a 65%,#0d3a7a 100%);transition:opacity .45s,transform .45s;padding:24px 16px 40px;overflow-y:auto}
#pick.gone{opacity:0;transform:scale(1.04);pointer-events:none}
.psun{position:absolute;top:-80px;right:-60px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,210,60,.45) 0%,rgba(255,150,20,.2) 45%,transparent 70%);pointer-events:none}
.pdeco{position:absolute;user-select:none;pointer-events:none;opacity:.1}
.pey{font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.6);margin-bottom:14px;text-align:center}
.ph1{font-size:clamp(32px,7vw,52px);font-weight:900;color:#fff;text-align:center;line-height:1;letter-spacing:-2px;margin-bottom:6px}
.ph1 em{color:#FFD234;font-style:normal}
.psub{font-size:14px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:36px;font-weight:300}
.plbl{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:14px;text-align:center}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:420px}
.pcard{border-radius:18px;padding:16px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);backdrop-filter:blur(12px);cursor:pointer;transition:transform .18s,background .18s,box-shadow .18s;position:relative;overflow:hidden}
.pcard:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 12px 32px rgba(0,0,0,.3);background:rgba(255,255,255,.18)}
.pcard:active{transform:scale(.97)}
.pav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff}
.pname{font-size:13px;font-weight:700;color:#fff;text-align:center}
.pdates{font-size:9px;color:rgba(255,255,255,.5);text-align:center;line-height:1.4}
.pshine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.12),transparent 60%);pointer-events:none}
.pallcard{grid-column:1/-1;flex-direction:row;justify-content:center;gap:12px;padding:14px 20px;border-color:rgba(255,210,60,.4);background:rgba(255,210,60,.12)}

/* APP */
#app{display:none;min-height:100vh;padding-bottom:60px}
#app.show{display:block}

/* HERO */
.hero{position:relative;overflow:hidden;min-height:220px;display:flex;flex-direction:column;justify-content:flex-end;padding:44px 20px 28px}
.hero-bg{position:absolute;inset:0;transition:background .5s}
.hdl,.hdr{position:absolute;font-size:90px;opacity:.1;user-select:none;pointer-events:none}
.hdl{bottom:10px;left:-10px;transform:rotate(-15deg);opacity:.06}
.hdr{top:10px;right:-5px;transform:rotate(12deg);opacity:.06}
.hwav{position:absolute;bottom:-1px;left:0;right:0;height:40px;background:var(--g4);clip-path:polygon(0 100%,100% 100%,100% 40%,0 100%);z-index:1}
.hbody{position:relative;z-index:2}
.htag{font-size:10px;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,.65);margin-bottom:10px}
.hname{font-size:clamp(36px,9vw,56px);font-weight:900;color:#fff;line-height:1;letter-spacing:-2px;margin-bottom:5px}
.hdates{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:4px}
.hnote{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}
.hkpis{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.kpi{background:rgba(255,255,255,.15);border-radius:12px;padding:8px 14px;backdrop-filter:blur(8px)}
.kpin{font-size:18px;font-weight:900;color:#fff}
.kpil{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.8px;margin-top:1px}

/* NAV */
.nav{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--g3);background:rgba(242,242,247,.96);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.nav::-webkit-scrollbar{display:none}
.nbtn{padding:12px 15px;font-size:12px;font-weight:600;white-space:nowrap;color:var(--mid);border-bottom:2.5px solid transparent;flex-shrink:0;transition:color .15s,border-color .15s}
.nbtn.on{color:var(--accent);border-bottom-color:var(--accent)}

/* SECTIONS */
.sec{display:none;max-width:680px;margin:0 auto;padding:18px 14px 40px}
.sec.on{display:block}
.sh2{font-size:17px;font-weight:800;margin-bottom:14px}

/* DAY CARDS */
.dc{background:var(--w);border-radius:16px;border:1px solid var(--g3);margin-bottom:8px;overflow:hidden;transition:box-shadow .2s}
.dc.open{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.dc.skip{opacity:.32;filter:grayscale(.8)}
.dh{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.dbadge{width:46px;height:46px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.bdd{font-size:7px;font-weight:700;opacity:.8;letter-spacing:.5px}
.bdt{font-size:9px;font-weight:900}
.dinfo{flex:1;min-width:0}
.dtitle{font-size:13px;font-weight:700;line-height:1.3}
.dsub{font-size:10px;color:var(--mid);margin-top:2px}
.dwho{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.wtag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;border:1px solid}
.dchev{font-size:9px;color:var(--g3);transition:transform .2s;margin-left:4px;flex-shrink:0}
.dc.open .dchev{transform:rotate(180deg)}
.dbody{display:none;border-top:1px solid #F5F5F7;padding:14px 16px}
.dc.open .dbody{display:block}

/* TIMELINE */
.tl{display:flex;flex-direction:column}
.tlrow{display:flex;gap:10px;padding-bottom:16px}
.tlrow:last-child{padding-bottom:0}
.tll{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:30px}
.tlico{width:28px;height:28px;border-radius:7px;background:var(--g4);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.tlvl{width:2px;flex:1;background:var(--g3);margin-top:3px;min-height:6px}
.tlr{flex:1;padding-top:2px}
.tlt{font-size:9px;font-weight:700;color:#AEAEB2;margin-bottom:1px}
.tln{font-size:12px;font-weight:700;margin-bottom:2px}
.tld{font-size:11px;color:var(--mid);line-height:1.55}
.tip{margin-top:7px;padding:6px 10px;background:#FFFBF0;border-left:3px solid var(--gold);border-radius:0 7px 7px 0;font-size:10px;color:#7A5C10;line-height:1.5}

/* GOOGLE MAPS LINK */
.gmlink{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;text-decoration:none;transition:opacity .15s}
.gmlink:hover{opacity:.85}
.gmlink svg{flex-shrink:0}

/* MEMBER */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.mcard{background:var(--w);border-radius:14px;padding:13px 14px;border:1px solid var(--g3);border-left:4px solid}
.mname{font-size:14px;font-weight:800;margin-bottom:3px}
.mnote{font-size:10px;color:var(--mid);line-height:1.55}
.mchips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.mchip{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700}

/* TL TABLE */
.tltw{background:var(--w);border-radius:16px;border:1px solid var(--g3);overflow:hidden}
.tlts{overflow-x:auto}
.tlt2 table{border-collapse:collapse;min-width:820px;width:100%}
.tlt2 th,.tlt2 td{padding:0}
.thname{padding:8px 12px;font-size:10px;font-weight:700;color:var(--mid);background:var(--g4);border-bottom:1px solid var(--g3);position:sticky;left:0;z-index:3;min-width:50px}
.thday{padding:6px 2px;font-size:8px;font-weight:700;text-align:center;background:var(--g4);border-bottom:1px solid var(--g3);min-width:32px}
.tdname{padding:5px 12px;font-size:10px;font-weight:700;position:sticky;left:0;background:var(--w);z-index:2;border-bottom:1px solid #F5F5F7}
.tdcell{padding:4px 2px;text-align:center;border-bottom:1px solid #F5F5F7}
.tldot{width:22px;height:14px;border-radius:4px;margin:0 auto;display:flex;align-items:center;justify-content:center}
.tldin{width:6px;height:6px;border-radius:50%}
.tdcity{padding:3px 2px;text-align:center;background:var(--g4)}
.ccip{font-size:7px;font-weight:700;border-radius:3px;padding:2px 1px;display:inline-block}
.tlleg{padding:8px 12px;border-top:1px solid var(--g3);display:flex;gap:10px;flex-wrap:wrap}

/* FLIGHTS */
.fcard{background:var(--w);border-radius:14px;border:1px solid var(--g3);border-left:4px solid;padding:13px 15px;margin-bottom:7px}
.flbl{font-size:9px;font-weight:700;letter-spacing:.8px;margin-bottom:5px}
.ftimes{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.ftime{font-size:18px;font-weight:900}
.farr{font-size:10px;color:var(--mid)}
.froute{font-size:10px;color:var(--mid)}
.fdet{font-size:9px;color:#AEAEB2;margin-top:1px}
.fcost{font-size:10px;font-weight:700;margin-top:5px}

/* HOTELS */
.hchd{border-radius:12px;padding:12px 15px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.hcname{font-size:18px;font-weight:900;color:#fff}
.hcct{font-size:11px;color:rgba(255,255,255,.7)}
.hcard{background:var(--w);border-radius:13px;border:1px solid var(--g3);padding:12px 14px;margin-bottom:7px}
.hname{font-size:13px;font-weight:700;margin-bottom:2px}
.hwho{font-size:10px;color:var(--mid);margin-top:2px}
.hnote{font-size:10px;color:#AEAEB2;margin-top:1px}
.hfoot{display:flex;gap:6px;margin-top:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.hdate{font-size:10px;padding:3px 9px;border-radius:9px;font-weight:700}
.hnts{font-size:10px;padding:3px 9px;border-radius:9px;background:var(--g4);color:var(--mid);font-weight:600}
.hprice{font-size:12px;font-weight:800}

/* FOOD */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.foodc{background:var(--w);border-radius:12px;padding:11px 12px;border:1px solid var(--g3)}
.foodn{font-size:8px;font-weight:800;letter-spacing:.5px;margin-bottom:2px}
.foodname{font-size:11px;font-weight:700;margin-bottom:2px}
.fooddesc{font-size:9px;color:var(--mid);line-height:1.4}

/* CHANGE BTN */
.chbtn{position:fixed;bottom:18px;right:18px;z-index:50;background:var(--accent);color:#fff;border-radius:50px;padding:11px 18px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .15s;border:none;cursor:pointer}
.chbtn:hover{transform:translateY(-2px)}

/* REGION DIVIDERS */
.rdiv{margin:18px 0 10px;display:flex;align-items:center;gap:10px}
.rdivbar{width:4px;height:18px;border-radius:2px}
.rdivlbl{font-size:12px;font-weight:800;letter-spacing:1px}

@media(max-width:380px){.pgrid{grid-template-columns:repeat(3,1fr)}}


/* ══ SPLIT ══ */
#sec-split{padding-bottom:80px}
.sp-hero{background:linear-gradient(135deg,#1D1D1F,#2C2C2E);border-radius:20px;padding:14px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.sp-hero::before{content:'💰';position:absolute;right:-10px;top:-10px;font-size:80px;opacity:.08}
.sp-hero-title{font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.5);margin-bottom:6px}
.sp-hero-rate{font-size:13px;color:rgba(255,255,255,.7);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.sp-hero-rate b{color:#FFD234}
.sp-rate-btn{background:rgba(255,255,255,.12);border:none;color:#FFD234;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;cursor:pointer;font-family:inherit}
.sp-rate-status{font-size:9px;color:rgba(255,255,255,.35);margin-top:6px}

/* FAB add button */
.sp-fab{position:fixed;bottom:80px;right:18px;z-index:150;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(0,0,0,.25);border:none;cursor:pointer;transition:transform .15s}
.sp-fab:hover{transform:scale(1.08)}

/* Drawer */
.sp-drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
.sp-drawer-bg.show{opacity:1;pointer-events:all}
.sp-drawer{position:fixed;bottom:0;left:0;right:0;z-index:301;background:#fff;border-radius:24px 24px 0 0;padding:0 0 40px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.15,1);max-height:92vh;overflow-y:auto}
.sp-drawer.show{transform:translateY(0)}
.sp-drawer-handle{width:36px;height:4px;border-radius:2px;background:#E5E5EA;margin:12px auto 0}
.sp-drawer-hd{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between}
.sp-drawer-title{font-size:17px;font-weight:800}
.sp-drawer-close{width:28px;height:28px;border-radius:50%;background:#F2F2F7;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.sp-body{padding:16px 18px}

/* Category */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.cat-btn{border:1.5px solid #E5E5EA;border-radius:14px;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:#fff;transition:all .15s;font-family:inherit}
.cat-btn.sel{border-color:var(--accent);background:var(--accent)12}
.cat-btn:hover{border-color:#AEAEB2}
.cat-icon{font-size:22px;line-height:1}
.cat-lbl{font-size:10px;font-weight:600;color:#6E6E73}
.cat-btn.sel .cat-lbl{color:var(--accent);font-weight:700}

/* Input */
.sp-field{margin-bottom:14px}
.sp-field label{font-size:11px;font-weight:700;color:#6E6E73;display:block;margin-bottom:6px;letter-spacing:.3px}
.sp-input{width:100%;padding:12px 14px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s;background:#fff}
.sp-input:focus{border-color:var(--accent)}
.sp-amt-row{display:flex;gap:8px}
.sp-amt-row .sp-input{flex:1}
.sp-cur-btns{display:flex;gap:6px}
.sp-cur-btn{flex:1;padding:12px 6px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s;text-align:center}
.sp-cur-btn.sel{color:#fff;border-color:transparent}

/* Who chips */
.sp-who-row{display:flex;gap:6px;flex-wrap:wrap}
.sp-m-btn{padding:7px 12px;border-radius:20px;border:1.5px solid #E5E5EA;font-size:12px;font-weight:700;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
.sp-m-btn.sel{color:#fff;border-color:transparent}
.sp-m-btn .dot{width:7px;height:7px;border-radius:50%}

/* Payer */
.sp-payer-row{display:flex;gap:6px;flex-wrap:wrap}
.sp-payer-btn{padding:7px 12px;border-radius:20px;border:1.5px solid #E5E5EA;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s}
.sp-payer-btn.sel{color:#fff;border-color:transparent}

/* Receipt */
.sp-receipt-area{border:2px dashed #E5E5EA;border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:border-color .15s}
.sp-receipt-area:hover{border-color:#AEAEB2}
.sp-receipt-area.has-img{border-style:solid;border-color:#E5E5EA}
.sp-receipt-preview{max-width:100%;max-height:120px;border-radius:8px;object-fit:cover}
.sp-receipt-label{font-size:12px;color:#AEAEB2;margin-top:6px}

/* Submit */
.sp-submit{width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700;color:#fff;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:4px}
.sp-submit:active{opacity:.85}

/* Item list */
.sp-items-wrap{margin-bottom:20px}
.sp-date-group{margin-bottom:4px}
.sp-date-hd{font-size:11px;font-weight:700;color:#AEAEB2;letter-spacing:.5px;padding:14px 0 6px}
.sp-item{background:#fff;border-radius:14px;border:1px solid #E5E5EA;padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s;position:relative}
.sp-item:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.sp-item-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sp-item-cat{font-size:18px;width:32px;height:32px;border-radius:10px;background:#F5F5F7;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sp-item-mid{flex:1;min-width:0}
.sp-item-desc{font-size:13px;font-weight:700;color:#1D1D1F}
.sp-item-meta{font-size:10px;color:#AEAEB2;margin-top:1px}
.sp-item-amt{font-size:14px;font-weight:900;text-align:right;flex-shrink:0}
.sp-item-per{font-size:9px;color:#AEAEB2;text-align:right}
.sp-item-who{display:flex;gap:3px;flex-wrap:wrap}
.sp-item-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:#F2F2F7;border:none;cursor:pointer;font-size:11px;color:#AEAEB2;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.sp-item:hover .sp-item-del{opacity:1}
.sp-img-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid #E5E5EA;flex-shrink:0}

/* Results */
.sp-results-wrap{}
.sp-view-tabs{display:flex;gap:6px;margin-bottom:14px;background:#F2F2F7;padding:3px;border-radius:12px}
.sp-vtab{flex:1;padding:8px 4px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;border:none;font-family:inherit;color:#6E6E73;transition:all .2s;text-align:center}
.sp-vtab.on{background:#fff;color:#1D1D1F;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* Summary view */
.sp-sum-card{background:#fff;border-radius:16px;border:1px solid #E5E5EA;overflow:hidden;margin-bottom:8px}
.sp-sum-hd{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.sp-sum-name{font-size:14px;font-weight:800}
.sp-sum-amt{font-size:18px;font-weight:900}
.sp-sum-body{border-top:1px solid #F5F5F7}
.sp-sum-row{padding:9px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #F5F5F7;font-size:11px}
.sp-sum-row:last-child{border-bottom:none}
.sp-sum-desc{color:#6E6E73;flex:1;margin-right:8px}
.sp-sum-val{font-weight:700;color:#1D1D1F;flex-shrink:0}

/* Settle view */
.sp-settle-card{background:#fff;border-radius:16px;border:1px solid #E5E5EA;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.sp-settle-arrow{font-size:18px;color:#AEAEB2;flex-shrink:0}
.sp-settle-info{flex:1}
.sp-settle-text{font-size:13px;font-weight:700;color:#1D1D1F}
.sp-settle-sub{font-size:10px;color:#AEAEB2;margin-top:2px}
.sp-settle-amt{font-size:16px;font-weight:900;flex-shrink:0}

/* Grand total bar */
.sp-grand{background:#1D1D1F;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sp-grand-lbl{color:rgba(255,255,255,.6);font-size:12px;font-weight:600}
.sp-grand-amt{color:#FFD234;font-size:20px;font-weight:900}

/* Detail modal */

// ── PICK SCREEN ──
let me=null;

function buildPick(){
  const grid=document.getElementById('pgrid');
  Object.entries(MEMBERS).forEach(([name,m])=>{
    const c=document.createElement('div'); c.className='pcard';
    c.innerHTML=`<div class="pshine"></div><div class="pav" style="background:${m.color}">${m.emoji}</div><div class="pname">${name}</div><div class="pdates">${m.from}–${m.to}</div>`;
    c.onclick=()=>selectPerson(name); grid.appendChild(c);
  });
  const all=document.createElement('div'); all.className='pcard pallcard';
  all.innerHTML=`<span style="font-size:22px">🌍</span><div><div class="pname" style="color:#FFD234">全部行程</div><div class="pdates" style="color:rgba(255,255,255,.5)">看所有人的行程</div></div>`;
  all.onclick=()=>selectPerson('__all__'); grid.appendChild(all);
}

function showPick(){
  document.getElementById('pick').classList.remove('gone');
  document.getElementById('app').classList.remove('show');
  document.getElementById('chbtn').style.display='none';
}

function selectPerson(name){
  me=name;
  document.getElementById('pick').classList.add('gone');
  setTimeout(()=>{
    buildApp();
    document.getElementById('app').classList.add('show');
    document.getElementById('chbtn').style.display='flex';
    const color=name==='__all__'?GOLD:MEMBERS[name].color;
    document.documentElement.style.setProperty('--accent',color);
    refreshNavColor();
  },350);
}

function refreshNavColor(){
  const c=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  document.querySelectorAll('.nbtn.on').forEach(b=>{b.style.color=c;b.style.borderBottomColor=c;});
}

// ── APP ──
function buildApp(){
  buildHero(); buildMyDays(); buildMembers(); buildFlights(); buildHotels(); buildFood(); buildSplit();
}

function buildHero(){
  const isAll=me==='__all__', m=isAll?null:MEMBERS[me];
  const color=isAll?GOLD:m.color;
  let bg1,bg2,dl,dr;
  if(isAll){bg1='#062A1E';bg2='#1253A0';dl='🌍';dr='🎉';}
  else if(m.kpis[1][0].includes('甲米')){bg1='#062A1E';bg2='#1A7A52';dl='🌴';dr='🏖';}
  else if(m.kpis[1][0].includes('曼谷')){bg1='#091838';bg2='#1A4B8C';dl='🏙';dr='🛍';}
  else{bg1='#3A1208';bg2='#C4522A';dl='⛩️';dr='🐘';}
  document.getElementById('hero-bg').style.background=`linear-gradient(150deg,${bg1} 0%,${bg2} 100%)`;
  document.getElementById('hdl').textContent=dl;
  document.getElementById('hdr').textContent=dr;
  document.getElementById('htag').textContent=isAll?'泰國三趴 22 日之旅 · 2026':`${me}的專屬行程 · 2026`;
  document.getElementById('hname').textContent=isAll?'🇹🇭 泰國三趴':`🇹🇭 ${me}`;
  document.getElementById('hdates').textContent=isAll?'7/23 — 8/13 · 清邁・曼谷・甲米':`${m.from} 出發 → ${m.to} 回台`;
  document.getElementById('hnote').textContent=isAll?'全員行程總覽 · 7 人・3 城市・22 天':m.note;
  const kpis=isAll?[['22','天行程'],['7','人同遊'],['3','城市']]:m.kpis;
  document.getElementById('hkpis').innerHTML=kpis.map(([n,l])=>`<div class="kpi"><div class="kpin">${n}</div><div class="kpil">${l}</div></div>`).join('');
  setTimeout(showProfileBadge,100);
}

  sec.innerHTML=`<div class="sh2">📅 ${me==='__all__'?'全部行程':'我的行程'}</div>`;
  let lastR=null;
  DAYS.forEach(day=>{
    const dk=day.date.split(' ')[0];

function toTWD(amt, cur){
  if(cur==='TWD') return amt;
  if(cur==='THB') return amt * SP.rates.THB_TWD;
  if(cur==='USD') return amt * SP.rates.USD_TWD;
  return amt;
}
function fromTWD(twd, cur){
  if(cur==='TWD') return twd;
  if(cur==='THB') return twd / SP.rates.THB_TWD;
  if(cur==='USD') return twd / SP.rates.USD_TWD;
  return twd;
}
function fmt(n, cur){
  if(cur==='THB') return 'THB ' + Math.round(n).toLocaleString();
  if(cur==='USD') return 'USD ' + n.toFixed(2);
  return 'TWD ' + Math.round(n).toLocaleString();
}
function fmtTWD(n){ return 'TWD ' + Math.round(n).toLocaleString(); }

// Fetch real exchange rate from Taiwan Bank via CORS proxy
async function fetchRates(){
  // Try multiple sources - Taiwan Bank doesn't allow direct CORS
  const sources = [
    // Source 1: exchangerate-api (free, reliable)
    async () => {
      const r = await fetch('https://api.exchangerate-api.com/v4/latest/TWD');
      const d = await r.json();
      return { THB_TWD: Math.round((1/d.rates.THB)*1000)/1000, USD_TWD: Math.round((1/d.rates.USD)*100)/100 };
    },
    // Source 2: frankfurter (ECB based)
    async () => {
      const r = await fetch('https://api.frankfurter.app/latest?from=TWD&to=THB,USD');
      const d = await r.json();
      return { THB_TWD: Math.round((1/d.rates.THB)*1000)/1000, USD_TWD: Math.round((1/d.rates.USD)*100)/100 };
    },
  ];
  for(const src of sources){
    try {
      const rates = await src();
      if(rates.THB_TWD > 0 && rates.USD_TWD > 0){
        SP.rates.THB_TWD = rates.THB_TWD;
        SP.rates.USD_TWD = rates.USD_TWD;
        SP.ratesFetched = true;
        renderRateBar();
        return;
      }
    } catch(e){ continue; }
  }
  // fallback: keep defaults, show note
}

function renderRateBar(){
  const rateHtml = `<span>匯率：</span><b>1 THB = ${SP.rates.THB_TWD} TWD</b><span style="margin:0 4px">·</span><b>1 USD = ${SP.rates.USD_TWD} TWD</b><button class="sp-rate-btn" style="background:#E5E5EA;color:#1D1D1F;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;border:none;cursor:pointer;font-family:inherit" onclick="manualRate()">✏️ 手動調整</button><div style="width:100%;font-size:9px;color:#AEAEB2;margin-top:2px">${SP.ratesFetched?'✓ 即時匯率':'預設匯率'}</div>`;
  const d = document.getElementById('sp-rate-bar-drawer');
  if(d) d.innerHTML = rateHtml;
}

function manualRate(){
  const t = prompt('1 THB = ? TWD（目前：'+SP.rates.THB_TWD+'）', SP.rates.THB_TWD);
  if(t && !isNaN(t)) SP.rates.THB_TWD = parseFloat(t);
  const u = prompt('1 USD = ? TWD（目前：'+SP.rates.USD_TWD+'）', SP.rates.USD_TWD);
  if(u && !isNaN(u)) SP.rates.USD_TWD = parseFloat(u);
  renderRateBar();
  renderSPResults();
}

async function sbLoadAll() {
  try {
    const r = await fetch(SB_URL + '/rest/v1/expenses?order=created_at.desc&select=*', {
      headers: sbHeaders()
    });
    if(!r.ok) throw new Error(r.status);
    const rows = await r.json();
    // Convert from DB format to SP.items format
    return rows.filter(r => r.action !== 'deleted').map(r => ({
      id: r.id,
      time: r.time,
      addedBy: r.added_by,
      cat: Object.values({meal:'meal',snack:'snack',coffee:'coffee',drink:'drink',trans:'trans',sight:'sight',shop:'shop',massage:'massage',other:'other'}).find(c => getCatLabel(c) === r.cat) || 'other',

      cur: r.cur,
      payer: r.payer,
      who: r.who ? r.who.split('、') : [],
      receipt: null,
      action: r.action
    }));
  } catch(e) {
    console.log('SB load error:', e);
    return null;
  }
}

async function sbAdd(item) {
  const twd = toTWD(item.amt, item.cur);
  const perHead = item.who.length > 0 ? twd / item.who.length : twd;
  try {
    const r = await fetch(SB_URL + '/rest/v1/expenses', {
      method: 'POST',
      headers: sbHeaders(),
      body: JSON.stringify({
        id: item.id,
        time: item.time,
        added_by: item.addedBy,
        cat: getCatLabel(item.cat),
        description: item.desc,
        amt: item.amt,
        cur: item.cur,
        twd: Math.round(twd),
        payer: item.payer,
        who: item.who.join('、'),
        per_head: Math.round(perHead),

            <button style="padding:5px 10px;border-radius:14px;border:1px solid #E5E5EA;font-size:11px;font-weight:700;cursor:pointer;background:#F5F5F7;font-family:inherit" onclick="spSelectAll()">全選</button>
            <button style="padding:5px 10px;border-radius:14px;border:1px solid #E5E5EA;font-size:11px;font-weight:700;cursor:pointer;background:#F5F5F7;font-family:inherit" onclick="spClearAll()">全不選</button>
          </div>
          <div class="sp-who-row" id="sp-who-row"></div>
        </div>
        <!-- Receipt -->
        <div class="sp-field">
          <label>收據（選填）</label>
          <div class="sp-receipt-area" id="sp-receipt-area" onclick="document.getElementById('sp-file').click()">
            <div id="sp-receipt-preview-wrap">
              <div style="font-size:24px;margin-bottom:4px">📷</div>
              <div class="sp-receipt-label">點擊上傳收據照片</div>
            </div>
          </div>
          <input type="file" id="sp-file" accept="image/*" style="display:none" onchange="handleReceipt(this)">
        </div>
        <!-- Rate bar in drawer -->
        <div id="sp-rate-bar-drawer" style="background:#F5F5F7;border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:11px;color:#6E6E73"></div>
        <!-- Submit -->
        <button class="sp-submit" id="sp-submit-btn" style="background:${ac}" onclick="submitSP()">新增這筆費用</button>
      </div>
    </div>

    <!-- Detail modal -->
    <div class="sp-modal-bg" id="sp-modal-bg" onclick="closeModal()">
      <div class="sp-modal" onclick="event.stopPropagation()" id="sp-modal"></div>
    </div>
  `;

  buildCats();
  buildCurBtns();
  buildPayerRow();
  buildWhoRow();
  renderSPList();
  renderSPResults();
  fetchRates();
}

function buildCats(){
  const wrap = document.getElementById('sp-cats');
  wrap.innerHTML = CATS.map(c=>`
    <button class="cat-btn" data-id="${c.id}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-lbl">${c.label}</span>
    </button>`).join('');
}

function selectCat(id){
  SP.selectedCat = id;
  const ac = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  document.querySelectorAll('.cat-btn').forEach(b=>{
    const s = b.dataset.id===id;
    b.classList.toggle('sel',s);
    b.style.borderColor = s?ac:'';
    b.style.background = s?ac+'18':'';
    b.querySelector('.cat-lbl').style.color = s?ac:'';
  });
}

function buildCurBtns(){
  const wrap = document.getElementById('sp-cur-btns');
  const ac = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ['THB','TWD','USD'].forEach(c=>{
    const b = document.createElement('button');
    b.className='sp-cur-btn'+(c==='THB'?' sel':'');
    b.textContent = c==='THB'?'🇹🇭 THB':c==='TWD'?'🇹🇼 TWD':'🇺🇸 USD';
    b.onclick=()=>{
      SP.selectedCur=c;
      document.querySelectorAll('.sp-cur-btn').forEach(x=>{x.classList.remove('sel');x.style.background='';x.style.color='';});
      b.classList.add('sel'); b.style.background=ac; b.style.color='#fff';
    };
    if(c==='THB'){b.style.background=ac;b.style.color='#fff';}
    wrap.appendChild(b);
  });
}

function buildPayerRow(){
  const wrap = document.getElementById('sp-payer-row');
  const ac = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  Object.entries(MEMBERS).forEach(([name,m])=>{
    const b = document.createElement('button');
    b.className='sp-payer-btn'; b.textContent=name; b.dataset.name=name;
    b.onclick=()=>{
      SP.selectedPayer=name;
      document.querySelectorAll('.sp-payer-btn').forEach(x=>{x.classList.remove('sel');x.style.background='';x.style.color='';x.style.borderColor='';});
      b.classList.add('sel'); b.style.background=m.color; b.style.color='#fff'; b.style.borderColor=m.color;
    };
    wrap.appendChild(b);
  });
}

function buildWhoRow(){
  const wrap = document.getElementById('sp-who-row');
  SP.selectedWho = [];
  Object.entries(MEMBERS).forEach(([name,m])=>{
    const b = document.createElement('button');
    b.className='sp-m-btn'; b.dataset.name=name;
    b.innerHTML=`<span class="dot" style="background:${m.color}"></span>${name}`;
    b.onclick=()=>{
      if(b.classList.contains('sel')){
        b.classList.remove('sel'); b.style.background=''; b.style.color=''; b.style.borderColor='';
        SP.selectedWho = SP.selectedWho.filter(n=>n!==name);
      } else {
        b.classList.add('sel'); b.style.background=m.color; b.style.borderColor=m.color; b.style.color='#fff';
        SP.selectedWho.push(name);
      }
    };
    wrap.appendChild(b);
  });
}

function spSelectAll(){
  SP.selectedWho = Object.keys(MEMBERS);
  document.querySelectorAll('.sp-m-btn').forEach(b=>{
    const m = MEMBERS[b.dataset.name];
    b.classList.add('sel'); b.style.background=m.color; b.style.borderColor=m.color; b.style.color='#fff';
  });
}
function spClearAll(){
  SP.selectedWho = [];
  document.querySelectorAll('.sp-m-btn').forEach(b=>{
    b.classList.remove('sel'); b.style.background=''; b.style.borderColor=''; b.style.color='';
  });
}

let receiptBase64 = null;
function handleReceipt(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    receiptBase64 = e.target.result;
    document.getElementById('sp-receipt-preview-wrap').innerHTML=`<img src="${receiptBase64}" class="sp-receipt-preview">`;
    document.getElementById('sp-receipt-area').classList.add('has-img');
  };
  reader.readAsDataURL(file);
}

function openDrawer(){
  document.getElementById('sp-drawer-bg').classList.add('show');
  document.getElementById('sp-drawer').classList.add('show');
  renderRateBar();
  // reset
  SP.selectedCat=null; SP.selectedCur='THB'; SP.selectedPayer=null;
  receiptBase64=null;
  document.querySelectorAll('.cat-btn').forEach(b=>{b.classList.remove('sel');b.style.borderColor='';b.style.background='';b.querySelector('.cat-lbl').style.color='';});
  document.querySelectorAll('.sp-cur-btn').forEach(b=>{b.classList.remove('sel');b.style.background='';b.style.color='';});
  const ac=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  document.querySelector('.sp-cur-btn').classList.add('sel');
  document.querySelector('.sp-cur-btn').style.background=ac;
  document.querySelector('.sp-cur-btn').style.color='#fff';
  document.querySelectorAll('.sp-payer-btn').forEach(b=>{b.classList.remove('sel');b.style.background='';b.style.color='';b.style.borderColor='';});
  document.getElementById('sp-desc').value='';
  document.getElementById('sp-amt').value='';
  document.getElementById('sp-receipt-preview-wrap').innerHTML='<div style="font-size:24px;margin-bottom:4px">📷</div><div class="sp-receipt-label">點擊上傳收據照片</div>';
  document.getElementById('sp-receipt-area').classList.remove('has-img');
  spClearAll();
  setTimeout(renderRateBar, 50);
}
function closeDrawer(){
  document.getElementById('sp-drawer-bg').classList.remove('show');
  document.getElementById('sp-drawer').classList.remove('show');
  SP.editId = null;
  // Reset title
  const t=document.querySelector('.sp-drawer-title'); if(t) t.textContent='新增費用';
  const b=document.getElementById('sp-submit-btn'); if(b) b.textContent='新增這筆費用';
}

function getNowStr(){
  const now=new Date();
  const m=now.getMonth()+1, d=now.getDate();
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
  return `${m}/${d} ${hh}:${mm}`;
}



// ── ACCOUNT SYSTEM ──
let ACCT = {name:'', avatar:'', member:'', color:'', loaded:false};

function loadAccount(){
  try {
    const saved = localStorage.getItem('thai_trip_acct');
    if(saved){
      ACCT = JSON.parse(saved);
      ACCT.loaded = true;
    }
  } catch(e){}
}

function saveAccount(){
  const name = document.getElementById('acct-name').value.trim();
  if(!name){ alert('請輸入你的名字！'); return; }
  if(!ACCT.member){ alert('請選擇你是哪位成員！'); return; }
  ACCT.name = name;
  ACCT.loaded = true;
  try { localStorage.setItem('thai_trip_acct', JSON.stringify(ACCT)); } catch(e){}
  document.getElementById('acct-screen').classList.add('gone');
  setTimeout(()=>{ document.getElementById('acct-screen').style.display='none'; },350);
  // Auto-select this member
  me = ACCT.member;
  const color = MEMBERS[me]?.color || '#1A4B8C';
  document.documentElement.style.setProperty('--accent', color);
  buildApp();
  document.getElementById('app').classList.add('show');
  document.getElementById('chbtn').style.display='flex';
  document.getElementById('pick').style.display='none';
}

function acctUploadPhoto(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    ACCT.avatar=e.target.result;
    document.getElementById('acct-av-img').src=ACCT.avatar;
  };
  reader.readAsDataURL(file);
}

function buildAcctMemberGrid(){
  const wrap=document.getElementById('acct-member-grid'); if(!wrap) return;
  Object.entries(MEMBERS).forEach(([name,m])=>{
    const b=document.createElement('button');
    b.className='acct-m-btn';
    b.innerHTML=`<div class="acct-m-dot" style="background:${m.color}">${name[0]}</div><div class="acct-m-name">${name}</div>`;
    b.onclick=()=>{
      ACCT.member=name; ACCT.color=m.color;
      if(!document.getElementById('acct-name').value) document.getElementById('acct-name').value=name;
      document.querySelectorAll('.acct-m-btn').forEach(x=>{x.classList.remove('sel');x.style.borderColor='';x.style.background='';});
      b.classList.add('sel'); b.style.borderColor=m.color; b.style.background=m.color+'15';
    };
    wrap.appendChild(b);
  });
}

function showProfileBadge(){
  const av = ACCT.avatar || `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='${encodeURIComponent(ACCT.color||'%23888')}'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='44' fill='white'%3E${encodeURIComponent(ACCT.name?ACCT.name[0]:'?')}%3C/text%3E%3C/svg%3E`;
  const heroEl=document.getElementById('hero'); if(!heroEl) return;
  // Remove old badge
  const old=document.getElementById('profile-badge-el'); if(old) old.remove();
  const badge=document.createElement('div');
  badge.id='profile-badge-el'; badge.className='profile-badge';
  badge.innerHTML=`<img src="${av}" class="profile-badge-av"><span class="profile-badge-name">${ACCT.name}</span>`;
  badge.onclick=openProfileModal;
  heroEl.appendChild(badge);
}

function openProfileModal(){
  const av = ACCT.avatar || '';
  document.getElementById('profile-modal').innerHTML=`
    <div class="sp-modal-hd">
      <div class="sp-modal-title">我的帳號</div>
      <button class="sp-modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="position:relative;width:80px;height:80px;margin:0 auto 12px;cursor:pointer" onclick="document.getElementById('profile-file').click()">
        <img id="pm-av" src="${av||`data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='${encodeURIComponent(ACCT.color||'%23888')}'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='44' fill='white'%3E${encodeURIComponent(ACCT.name?ACCT.name[0]:'?')}%3C/text%3E%3C/svg%3E`}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #E5E5EA">
        <div style="position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;background:#1D1D1F;display:flex;align-items:center;justify-content:center;font-size:12px">📷</div>
      </div>
      <input type="file" id="profile-file" accept="image/*" style="display:none" onchange="profileUploadPhoto(this)">
      <input id="pm-name" value="${ACCT.name}" style="width:100%;padding:12px 14px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:16px;font-family:inherit;outline:none;text-align:center;margin-bottom:12px">
      <div style="font-size:11px;color:#AEAEB2;margin-bottom:16px">目前身份：<b style="color:${ACCT.color}">${ACCT.member}</b></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px" id="pm-member-grid"></div>
    <button onclick="saveProfileEdit()" style="width:100%;padding:14px;border-radius:14px;background:#1D1D1F;color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;margin-bottom:10px">儲存更改</button>
    <button onclick="clearAccount()" style="width:100%;padding:12px;border-radius:14px;background:#FF3B3015;color:#FF3B30;border:1px solid #FF3B3025;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit">清除帳號（重新設定）</button>
  `;
  // Build member grid in modal
  const mg=document.getElementById('pm-member-grid');
  Object.entries(MEMBERS).forEach(([name,m])=>{
    const b=document.createElement('button');
    const isSel=name===ACCT.member;
    b.style.cssText=`border:${isSel?'2px':'1.5px'} solid ${isSel?m.color:'#E5E5EA'};border-radius:14px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:${isSel?m.color+'15':'#fff'};font-family:inherit`;
    b.innerHTML=`<div style="width:28px;height:28px;border-radius:50%;background:${m.color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px">${name[0]}</div><div style="font-size:11px;font-weight:700;color:#1D1D1F">${name}</div>`;
    b.dataset.name=name; b.dataset.color=m.color;
    b.onclick=()=>{
      document.querySelectorAll('#pm-member-grid button').forEach(x=>{x.style.borderColor='#E5E5EA';x.style.borderWidth='1.5px';x.style.background='#fff';});
      b.style.borderColor=m.color; b.style.borderWidth='2px'; b.style.background=m.color+'15';
      // Update name if matches old member name
      const ni=document.getElementById('pm-name');
      if(ni.value===ACCT.member) ni.value=name;
    };
    mg.appendChild(b);
  });
  document.getElementById('profile-modal-bg').classList.add('show');
}
function closeProfileModal(){document.getElementById('profile-modal-bg').classList.remove('show');}

function profileUploadPhoto(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ document.getElementById('pm-av').src=e.target.result; ACCT._tempAvatar=e.target.result; };
  reader.readAsDataURL(file);
}

function saveProfileEdit(){
  const name=document.getElementById('pm-name').value.trim();
  if(!name){ alert('請輸入名字！'); return; }
  const selBtn=document.querySelector('#pm-member-grid button[style*="border-width: 2px"], #pm-member-grid button[style*="borderWidth"]');
  // Find selected member by border style
  let selMember=ACCT.member, selColor=ACCT.color;
  document.querySelectorAll('#pm-member-grid button').forEach(b=>{
    if(b.style.borderWidth==='2px'){ selMember=b.dataset.name; selColor=b.dataset.color; }
  });
  ACCT.name=name;
  ACCT.member=selMember;
  ACCT.color=selColor;
  if(ACCT._tempAvatar){ ACCT.avatar=ACCT._tempAvatar; delete ACCT._tempAvatar; }
  try { localStorage.setItem('thai_trip_acct',JSON.stringify(ACCT)); } catch(e){}
  // Update app
  me=selMember;
  document.documentElement.style.setProperty('--accent',selColor);
  closeProfileModal();
  buildApp();
  showProfileBadge();
}

function clearAccount(){
  if(!confirm('確定要清除帳號？下次打開需要重新設定。')) return;
  try{ localStorage.removeItem('thai_trip_acct'); }catch(e){}
  location.reload();
}

// Override selectPerson to save to account & remember
const _origSelectPerson = selectPerson;
function selectPerson(name){
  if(name==='__all__'){
    _origSelectPerson(name);
    return;
  }
  // If no account saved, prompt setup after selection
  me=name;
  const m=MEMBERS[name];
  ACCT.member=name; ACCT.color=m?.color||'#888';
  if(!ACCT.name) ACCT.name=name;
  document.getElementById('pick-screen').classList.add('gone');
  setTimeout(()=>{
    buildApp();
    document.getElementById('app').classList.add('show');
    document.getElementById('chbtn').style.display='flex';
    document.getElementById('quick-split-btn').style.display='flex';
    const color=m?.color||'#C4522A';
    document.documentElement.style.setProperty('--accent',color);
    refreshNavColor();
    showProfileBadge();
    try{ localStorage.setItem('thai_trip_acct',JSON.stringify(ACCT)); }catch(e){}
  },350);
}

function initApp(){
  buildAcctMemberGrid();
  loadAccount();
  if(ACCT.loaded && ACCT.member && ACCT.name){
    // Auto login
    me = ACCT.member;
    const color = ACCT.color || MEMBERS[me]?.color || '#C4522A';
    document.documentElement.style.setProperty('--accent', color);
    document.getElementById('acct-screen').style.display='none';
    document.getElementById('pick').style.display='none';
    buildApp();
    document.getElementById('app').classList.add('show');
    document.getElementById('chbtn').style.display='flex';
    setTimeout(showProfileBadge, 300);
    refreshNavColor();
  } else {
    // First time: show account setup
    document.getElementById('pick').style.display='none';
    buildPick(); // still build pick in background for fallback
  }
}

initApp();
</script>
