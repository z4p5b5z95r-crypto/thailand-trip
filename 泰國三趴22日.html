<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇭 泰國三趴 22 日之旅</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:#F2F2F7;color:#1D1D1F;font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;padding:56px 28px 52px;
  background:linear-gradient(155deg,#04291c 0%,#0a4a34 25%,#166648 45%,#1a7a8a 70%,#0d3d7a 100%);
}
.hero-sun{position:absolute;top:-90px;right:-70px;width:380px;height:380px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,218,60,.55) 0%,rgba(255,155,20,.28) 45%,transparent 70%)}
.hero-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:40px 40px}
.hero-wave{position:absolute;bottom:0;left:0;right:0;height:48px;
  background:linear-gradient(to bottom right,transparent 49.5%,#F2F2F7 50%)}
.hero-deco{position:absolute;user-select:none;pointer-events:none;opacity:.12}
.hero-body{position:relative;z-index:2;max-width:760px}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;
  letter-spacing:2.5px;color:rgba(255,255,255,.65);margin-bottom:18px}
.hero-tag::before{content:'';display:block;width:22px;height:1px;background:rgba(255,255,255,.4)}
.hero-title{font-size:clamp(44px,9vw,70px);font-weight:900;color:#fff;
  line-height:.95;letter-spacing:-3px;margin-bottom:10px;text-shadow:0 2px 28px rgba(0,0,0,.2)}
.hero-title em{color:#FFD234;font-style:normal;text-shadow:0 0 40px rgba(255,210,50,.4)}
.hero-sub{font-size:15px;color:rgba(255,255,255,.6);font-weight:300;letter-spacing:.3px;margin-bottom:26px}
.hero-kpis{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:28px}
.kpi-num{font-size:30px;font-weight:900;color:#fff;line-height:1}
.kpi-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1.5px;
  text-transform:uppercase;margin-top:3px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.11);font-size:12px;font-weight:700;letter-spacing:.2px}
.pill-dates{font-size:9px;color:rgba(255,255,255,.45);margin-left:4px}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;display:flex;overflow-x:auto;scrollbar-width:none;
  background:rgba(242,242,247,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid #E5E5EA}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:13px 16px;font-size:13px;font-weight:600;white-space:nowrap;
  color:#6E6E73;border-bottom:2.5px solid transparent;flex-shrink:0;transition:all .18s}
.nav-btn.active{color:#1D1D1F;border-bottom-color:#1D1D1F}
.nav-btn.active[data-t=chiangmai]{color:#C4522A;border-bottom-color:#C4522A}
.nav-btn.active[data-t=bangkok]{color:#1A4B8C;border-bottom-color:#1A4B8C}
.nav-btn.active[data-t=krabi]{color:#1A7A52;border-bottom-color:#1A7A52}

/* ── LAYOUT ── */
.sec{display:none;max-width:800px;margin:0 auto;padding:22px 14px 72px}
.sec.on{display:block}

/* ── SECTION BANNER ── */
.s-banner{border-radius:20px;padding:28px 24px;margin-bottom:22px;position:relative;overflow:hidden}
.s-banner-bg{position:absolute;inset:0;opacity:.08;
  background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 24px),
  repeating-linear-gradient(-45deg,#fff 0,#fff 1px,transparent 0,transparent 24px)}
.s-banner-body{position:relative;z-index:1}
.s-banner-eyebrow{font-size:10px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:6px}
.s-banner-title{font-size:32px;font-weight:900;color:#fff;line-height:1.05;margin-bottom:5px}
.s-banner-sub{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:18px}
.s-stats{display:flex;gap:22px;flex-wrap:wrap}
.s-stat-num{font-size:20px;font-weight:900;color:#fff}
.s-stat-label{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-top:1px;text-transform:uppercase}

/* ── CITY GRID ── */
.city-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.city-tile{border-radius:16px;padding:20px 16px;cursor:pointer;
  transition:transform .2s;position:relative;overflow:hidden;min-height:140px;
  display:flex;flex-direction:column;justify-content:flex-end}
.city-tile:hover{transform:translateY(-3px)}
.city-tile-bg{position:absolute;inset:0;opacity:.1;font-size:100px;
  display:flex;align-items:center;justify-content:center;user-select:none}
.city-tile-eyebrow{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);
  letter-spacing:1px;margin-bottom:3px;position:relative;z-index:1}
.city-tile-name{font-size:22px;font-weight:900;color:#fff;position:relative;z-index:1}
.city-tile-date{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;position:relative;z-index:1}

/* ── HIGHLIGHT CARDS ── */
.hl-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;margin-bottom:22px}
.hl-scroll::-webkit-scrollbar{display:none}
.hl-card{flex-shrink:0;width:165px;border-radius:14px;padding:16px 14px;
  min-height:180px;display:flex;flex-direction:column;justify-content:flex-end;
  position:relative;overflow:hidden;cursor:default}
.hl-card-bg{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:64px;opacity:.18;user-select:none}
.hl-tag{position:absolute;top:10px;left:10px;font-size:9px;font-weight:800;
  padding:3px 8px;border-radius:10px;color:#fff;letter-spacing:.5px}
.hl-title{font-size:13px;font-weight:800;color:#fff;line-height:1.3;position:relative;z-index:1}
.hl-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:3px;position:relative;z-index:1}

/* ── WHITE BOX ── */
.wbox{background:#fff;border-radius:18px;padding:20px;margin-bottom:20px;
  border:1px solid #E5E5EA}
.wbox-title{font-size:16px;font-weight:800;margin-bottom:14px}

/* ── MAP ── */
.map-wrap{display:flex;height:420px;border-radius:14px;overflow:hidden;border:1px solid #E5E5EA}
.map-list{width:195px;flex-shrink:0;background:#fff;overflow-y:auto;
  border-right:1px solid #E5E5EA}
.map-list-hd{padding:10px 13px 8px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;border-bottom:2px solid}
.map-row{display:flex;gap:8px;align-items:flex-start;padding:9px 12px;
  cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.map-row:hover{background:#F5F5F7}
.map-row.sel{border-left-color:var(--rc);background:rgba(0,0,0,.04)}
.map-icon{font-size:15px;flex-shrink:0;line-height:1.3}
.map-zh{font-size:11px;font-weight:600;line-height:1.3;color:#1D1D1F}
.map-en{font-size:9px;color:#AEAEB2;margin-top:1px}
.map-pane{flex:1;position:relative}
.map-pane iframe{width:100%;height:100%;border:none;display:block}
.map-pop{position:absolute;bottom:14px;left:14px;background:#fff;
  border-radius:12px;padding:11px 14px;box-shadow:0 4px 20px rgba(0,0,0,.14);
  max-width:210px;z-index:10}
.map-pop-name{font-size:13px;font-weight:700;margin-bottom:3px}
.map-pop-sub{font-size:10px;color:#6E6E73;margin-bottom:6px}
.map-pop-link{font-size:11px;font-weight:700;text-decoration:none;
  display:inline-flex;align-items:center;gap:3px}

/* ── MAP REGION TABS ── */
.map-rtabs{display:flex;gap:6px}
.map-rtab{padding:4px 12px;border-radius:20px;border:1.5px solid #E5E5EA;
  background:transparent;color:#6E6E73;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .15s}

/* ── FOOD MINI GRID ── */
.food-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px}
.food-tile{border-radius:14px;padding:16px 13px;min-height:100px;
  display:flex;flex-direction:column;justify-content:flex-end;
  position:relative;overflow:hidden}
.food-tile-bg{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:48px;opacity:.2;user-select:none}
.food-tile-name{font-size:12px;font-weight:800;color:#fff;line-height:1.3;position:relative;z-index:1}
.food-tile-sub{font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;position:relative;z-index:1}

/* ── SECTION TITLE ── */
.sec-h2{font-size:18px;font-weight:800;margin-bottom:14px}
.sec-h2-sub{font-size:13px;color:#6E6E73;margin-top:-10px;margin-bottom:14px}

/* ── MEMBER CARDS ── */
.member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.m-card{background:#fff;border-radius:14px;padding:15px 16px;
  border:1px solid #E5E5EA;border-left:4px solid}
.m-name{font-size:16px;font-weight:800;margin-bottom:4px}
.m-note{font-size:11px;color:#6E6E73;line-height:1.6}
.m-chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.m-chip{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:700}

/* ── TIMELINE TABLE ── */
.tl-box{background:#fff;border-radius:18px;border:1px solid #E5E5EA;overflow:hidden;margin-bottom:16px}
.tl-scroll{overflow-x:auto}
.tl-tbl{border-collapse:collapse;min-width:940px;width:100%}
.tl-tbl th,.tl-tbl td{padding:0;border:none}
.th-name{padding:9px 14px;font-size:11px;font-weight:700;color:#6E6E73;
  background:#F5F5F7;border-bottom:1px solid #E5E5EA;
  position:sticky;left:0;z-index:3;min-width:56px}
.th-day{padding:7px 0;font-size:9px;font-weight:700;text-align:center;
  background:#F5F5F7;border-bottom:1px solid #E5E5EA;min-width:36px}
.td-name{padding:6px 14px;font-size:11px;font-weight:700;
  position:sticky;left:0;background:#fff;z-index:2;border-bottom:1px solid #F5F5F7}
.td-cell{padding:5px 0;text-align:center;border-bottom:1px solid #F5F5F7}
.tl-dot{width:24px;height:16px;border-radius:4px;margin:0 auto;
  display:flex;align-items:center;justify-content:center}
.tl-dot-in{width:7px;height:7px;border-radius:50%}
.td-city{padding:4px 0;text-align:center;background:#F5F5F7}
.city-chip{font-size:8px;font-weight:700;border-radius:3px;padding:2px 3px;display:inline-block}
.tl-legend{padding:10px 14px;border-top:1px solid #E5E5EA;
  display:flex;gap:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:11px;font-weight:700}
.leg-date{font-size:9px;color:#AEAEB2}

/* ── DAY CARDS ── */
.day-list{display:flex;flex-direction:column;gap:8px}
.d-card{background:#fff;border-radius:16px;border:1px solid #E5E5EA;overflow:hidden;
  transition:box-shadow .2s}
.d-card.open{box-shadow:0 4px 24px rgba(0,0,0,.08)}
.d-head{display:flex;align-items:center;gap:12px;padding:14px 18px;
  cursor:pointer;user-select:none}
.d-badge{width:46px;height:46px;border-radius:12px;color:#fff;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center}
.d-badge-d{font-size:8px;font-weight:700;opacity:.75;letter-spacing:.5px}
.d-badge-date{font-size:10px;font-weight:900}
.d-info{flex:1;min-width:0}
.d-title{font-size:14px;font-weight:700;color:#1D1D1F;line-height:1.3}
.d-sub{font-size:11px;color:#6E6E73;margin-top:1px}
.d-who{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.who{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;border:1px solid}
.d-chev{font-size:10px;color:#AEAEB2;transition:transform .2s;flex-shrink:0;margin-left:4px}
.d-card.open .d-chev{transform:rotate(180deg)}
.d-body{display:none;border-top:1px solid #F5F5F7;padding:16px 18px}
.d-card.open .d-body{display:block}

/* ── TIMELINE ITEMS ── */
.tl-item{display:flex;gap:12px;padding-bottom:18px}
.tl-item:last-child{padding-bottom:0}
.tl-l{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:32px}
.tl-icon{width:30px;height:30px;border-radius:8px;background:#F5F5F7;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tl-line-v{width:2px;flex:1;background:#E5E5EA;margin-top:4px;min-height:8px}
.tl-r{flex:1;padding-top:3px}
.tl-t{font-size:10px;font-weight:700;color:#AEAEB2;letter-spacing:.5px;margin-bottom:2px}
.tl-n{font-size:13px;font-weight:700;color:#1D1D1F;margin-bottom:3px}
.tl-d{font-size:12px;color:#6E6E73;line-height:1.6}
.tip{margin-top:8px;padding:7px 11px;background:#FFFBF0;
  border-left:3px solid #C49A28;border-radius:0 8px 8px 0;
  font-size:11px;color:#7A5C10;line-height:1.55}
.gmap{display:inline-flex;align-items:center;gap:3px;
  margin-top:7px;font-size:11px;font-weight:700;text-decoration:none}

/* ── FLIGHT CARDS ── */
.f-list{display:flex;flex-direction:column;gap:8px}
.f-card{background:#fff;border-radius:16px;border:1px solid #E5E5EA;
  border-left:4px solid;padding:15px 18px}
.f-label{font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.f-times{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.f-time{font-size:20px;font-weight:900;color:#1D1D1F}
.f-arr{font-size:11px;color:#AEAEB2}
.f-route{font-size:12px;color:#6E6E73}
.f-detail{font-size:11px;color:#AEAEB2;margin-top:2px}
.f-cost{font-size:11px;font-weight:700;margin-top:6px}

/* ── HOTEL SECTION ── */
.h-city{margin-bottom:22px}
.h-city-hd{border-radius:14px;padding:14px 18px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between}
.h-city-name{font-size:20px;font-weight:900;color:#fff}
.h-city-count{font-size:12px;color:rgba(255,255,255,.7)}
.h-card{background:#fff;border-radius:14px;border:1px solid #E5E5EA;
  padding:14px 16px;margin-bottom:8px}
.h-name{font-size:14px;font-weight:700;margin-bottom:3px}
.h-who{font-size:11px;color:#6E6E73;margin-top:2px}
.h-note{font-size:11px;color:#AEAEB2;margin-top:1px}
.h-footer{display:flex;gap:8px;margin-top:10px;align-items:center;
  justify-content:space-between;flex-wrap:wrap}
.h-date{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700}
.h-nights{font-size:11px;padding:3px 10px;border-radius:10px;
  background:#F5F5F7;color:#6E6E73;font-weight:600}
.h-price{font-size:13px;font-weight:800}

@media(max-width:600px){
  .city-row{grid-template-columns:repeat(3,1fr)}
  .member-grid{grid-template-columns:1fr 1fr}
  .hero{padding:44px 18px 48px}
}
</style>
</head>
<body>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-sun"></div>
  <div class="hero-grid"></div>
  <div class="hero-wave"></div>
  <!-- deco -->
  <div class="hero-deco" style="font-size:130px;top:-20px;left:-30px;transform:rotate(-18deg)">🌴</div>
  <div class="hero-deco" style="font-size:90px;top:10px;right:10px;transform:rotate(16deg)">🌴</div>
  <div class="hero-deco" style="font-size:50px;bottom:70px;left:35%;transform:rotate(-6deg)">🌴</div>
  <div class="hero-deco" style="font-size:38px;top:42%;left:16%">🐘</div>
  <div class="hero-deco" style="font-size:32px;top:28%;right:26%">⛩️</div>
  <div class="hero-deco" style="font-size:28px;bottom:80px;right:14%">🏖</div>
  <div class="hero-body">
    <div class="hero-tag">2026 · 7/23 — 8/13 · 三城三趴</div>
    <div class="hero-title">🇹🇭 泰國<br><em>22日</em>之旅</div>
    <div class="hero-sub">清邁 · 曼谷 · 甲米 &nbsp;—&nbsp; 寺廟、夜市、海灘、美食全制霸</div>
    <div class="hero-kpis">
      <div><div class="kpi-num">22</div><div class="kpi-label">天行程</div></div>
      <div><div class="kpi-num">3</div><div class="kpi-label">城市</div></div>
      <div><div class="kpi-num">7</div><div class="kpi-label">人同遊</div></div>
      <div><div class="kpi-num">8+</div><div class="kpi-label">間住宿</div></div>
    </div>
    <div class="pills" id="hero-pills"></div>
  </div>
</div>

<!-- ── NAV ── -->
<nav class="nav">
  <button class="nav-btn active" data-t="overview" onclick="goTab(this)">🗺 總覽</button>
  <button class="nav-btn" data-t="members" onclick="goTab(this)">👥 成員</button>
  <button class="nav-btn" data-t="chiangmai" onclick="goTab(this)">🏔 清邁</button>
  <button class="nav-btn" data-t="bangkok" onclick="goTab(this)">🏙 曼谷</button>
  <button class="nav-btn" data-t="krabi" onclick="goTab(this)">🌴 甲米</button>
  <button class="nav-btn" data-t="flights" onclick="goTab(this)">✈️ 航班</button>
  <button class="nav-btn" data-t="hotels" onclick="goTab(this)">🏨 住宿</button>
</nav>

<!-- ── OVERVIEW ── -->
<div class="sec on" id="sec-overview">
  <div class="city-row" id="city-row"></div>
  <div class="sec-h2">✨ 旅程亮點</div>
  <div class="hl-scroll" id="hl-scroll"></div>
  <div class="wbox">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="wbox-title" style="margin-bottom:0">🗺 互動地圖</div>
      <div class="map-rtabs" id="map-rtabs"></div>
    </div>
    <div class="map-wrap" id="map-main"></div>
  </div>
  <div class="sec-h2">🍜 三城必吃</div>
  <div class="food-row" id="food-row"></div>
</div>

<!-- ── MEMBERS ── -->
<div class="sec" id="sec-members">
  <div class="sec-h2">👥 成員行程</div>
  <div class="sec-h2-sub">7 人 · 3 城市 · 最長 22 天</div>
  <div class="member-grid" id="member-grid"></div>
  <div class="tl-box">
    <div class="tl-scroll"><table class="tl-tbl" id="tl-tbl"></table></div>
    <div class="tl-legend" id="tl-legend"></div>
  </div>
</div>

<!-- ── CHIANG MAI ── -->
<div class="sec" id="sec-chiangmai">
  <div class="s-banner" style="background:linear-gradient(135deg,#8B2A08,#C4522A,#E07040)" id="cm-banner"></div>
  <div class="wbox">
    <div style="font-size:13px;font-weight:700;color:#C4522A;margin-bottom:12px">🗺 清邁景點地圖</div>
    <div class="map-wrap" id="map-cm"></div>
  </div>
  <div class="sec-h2">📅 每日行程</div>
  <div class="day-list" id="days-cm"></div>
</div>

<!-- ── BANGKOK ── -->
<div class="sec" id="sec-bangkok">
  <div class="s-banner" style="background:linear-gradient(135deg,#0A1C4E,#1A4B8C,#3068B8)" id="bk-banner"></div>
  <div class="wbox">
    <div style="font-size:13px;font-weight:700;color:#1A4B8C;margin-bottom:12px">🗺 曼谷景點地圖</div>
    <div class="map-wrap" id="map-bk"></div>
  </div>
  <div class="sec-h2">📅 每日行程</div>
  <div class="day-list" id="days-bk"></div>
</div>

<!-- ── KRABI ── -->
<div class="sec" id="sec-krabi">

let selPlace={chiangmai:null,bangkok:null,krabi:null};

function mkMap(wrapId, region, color) {
  const W=document.getElementById(wrapId);
  const ps=PLACES[region];
  const dflt={chiangmai:'Chiang+Mai+Old+City+Thailand',bangkok:'Bangkok+Thailand+City+Center',krabi:'Ao+Nang+Krabi+Thailand'}[region];
  W.innerHTML=`
    <div class="map-list" style="--rc:${color}">
      <div class="map-list-hd" style="color:${color};border-bottom-color:${color}22">${ps.length} 個地點</div>
      ${ps.map((p,i)=>`<div class="map-row" id="mr-${region}-${i}" style="--rc:${color}" onclick="selP('${region}',${i},'${p.q}','${p.zh}','${p.name}','${p.cat}','${color}')">
        <span class="map-icon">${CE[p.cat]}</span>
        <div><div class="map-zh">${p.zh}</div><div class="map-en">${p.name}</div></div>
      </div>`).join('')}
    </div>
    <div class="map-pane" id="mp-${region}">
      <iframe src="https://maps.google.com/maps?q=${dflt}&output=embed&hl=zh-TW" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>`;
}

function selP(region,idx,q,zh,name,cat,color) {
  if(selPlace[region]!==null){
    const prev=document.getElementById(`mr-${region}-${selPlace[region]}`);
    if(prev){prev.classList.remove('sel');prev.style.borderLeftColor='transparent';prev.style.background='';}
  }
  selPlace[region]=idx;
  const el=document.getElementById(`mr-${region}-${idx}`);
  if(el){el.classList.add('sel');el.style.borderLeftColor=color;el.style.background=`${color}0D`;}
  document.getElementById(`mp-${region}`).innerHTML=`
    <iframe src="https://maps.google.com/maps?q=${q}&output=embed&hl=zh-TW" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    <div class="map-pop">
      <div class="map-pop-name" style="color:${color}">${CE[cat]} ${zh}</div>
      <div class="map-pop-sub">${name}</div>
      <a class="map-pop-link" style="color:${color}" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}" target="_blank" rel="noopener">📍 在 Google Maps 開啟</a>
    </div>`;
}

MEMBERS.forEach(m=>{
  document.getElementById('tl-legend').innerHTML+=
    `<div class="leg-item"><div class="leg-dot" style="background:${m.color}"></div>
     <span class="leg-name" style="color:${m.color}">${m.name}</span>
     <span class="leg-date">${m.from}–${m.to}</span></div>`;
});

/* ── DAY CARDS ── */
function mkDays(containerId, days) {
  const W=document.getElementById(containerId);
  days.forEach(day=>{
    const c=day.r==='cm'?CM:day.r==='bk'?BK:KR;
    const who=(day.who||[]).map(n=>{const m=MEMBERS.find(x=>x.name===n);
      return m?`<span class="who" style="color:${m.color};background:${m.color}18;border-color:${m.color}38">${n}</span>`:'';}
    ).join('');
    const items=day.items.map((it,i)=>`
      <div class="tl-item">
        <div class="tl-l">
          <div class="tl-icon">${it.e}</div>
          ${i<day.items.length-1?'<div class="tl-line-v"></div>':''}
        </div>
        <div class="tl-r">
          <div class="tl-t">${it.t}</div>
          <div class="tl-n">${it.n}</div>
          <div class="tl-d">${it.d}</div>
          ${it.tip?`<div class="tip">💡 ${it.tip}</div>`:''}
          ${it.map?`<a class="gmap" style="color:${c}" href="https://www.google.com/maps/search/?api=1&query=${it.map}" target="_blank" rel="noopener">📍 Google Maps</a>`:''}
        </div>
      </div>`).join('');
    const div=document.createElement('div');
    div.className='d-card';div.id=day.id;
    div.innerHTML=`
      <div class="d-head" onclick="toggleDay('${day.id}')">
        <div class="d-badge" style="background:${c}">
          <div class="d-badge-d">${day.day}</div>
          <div class="d-badge-date">${day.date.split(' ')[0]}</div>
        </div>
        <div class="d-info">
          <div class="d-title">${day.title}</div>
          <div class="d-sub">${day.date}</div>
          <div class="d-who">${who}</div>
        </div>
        <div class="d-chev">▼</div>
      </div>
      <div class="d-body"><div style="display:flex;flex-direction:column">${items}</div></div>`;
    W.appendChild(div);
  });
}
mkDays('days-cm',DAYS.filter(d=>d.r==='cm'));
mkDays('days-bk',DAYS.filter(d=>d.r==='bk'));
mkDays('days-kr',DAYS.filter(d=>d.r==='kr'));

/* ── FLIGHTS ── */
FLIGHTS.forEach(f=>{
  document.getElementById('f-list').innerHTML+=
    `<div class="f-card" style="border-left-color:${f.c}">
      <div class="f-label" style="color:${f.c}">${f.label}</div>
      <div class="f-times">
        <span class="f-time">${f.dep}</span>
        ${f.dep!=='—'?'<span class="f-arr">──✈──</span>':''}
        <span class="f-time">${f.arr}</span>
      </div>
      <div class="f-route">${f.from} → ${f.to}</div>
      <div class="f-detail">${f.date} · ${f.flight}</div>
      ${f.cost?`<div class="f-cost" style="color:${f.c}">${f.cost}</div>`:''}
    </div>`;
});

/* ── HOTELS ── */
HOTELS.forEach(city=>{
  document.getElementById('h-list').innerHTML+=
    `<div class="h-city">
      <div class="h-city-hd" style="background:${city.color}">
        <div class="h-city-name">${city.city}</div>
        <div class="h-city-count">${city.stays.length} 間住宿</div>
      </div>
      ${city.stays.map(h=>`
        <div class="h-card">
          <div class="h-name">${h.name}</div>
          <div class="h-who">👤 ${h.who}</div>
          <div class="h-note">${h.note}</div>
          <div class="h-footer">
            <div style="display:flex;gap:6px">
              <span class="h-date" style="background:${city.color}18;color:${city.color}">${h.dates}</span>
              <span class="h-nights">${h.nights} 晚</span>
            </div>
            <span class="h-price" style="color:${city.color}">${h.price}</span>
          </div>
        </div>`).join('')}
    </div>`;
});

/* ── NAVIGATION ── */
function goTab(btn) {
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+btn.dataset.t).classList.add('on');
  btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function goTabById(t){
  const btn=document.querySelector(`.nav-btn[data-t="${t}"]`);
  if(btn)goTab(btn);
}
function toggleDay(id){
  document.getElementById(id).classList.toggle('open');
}
</script>
</body>
</html>
